  // ---------- ティッカー ----------
  function nextTicker() {
    let pool;
    if (state.rank >= 4) pool = S.ticker.empire;
    else if (state.noto >= 60) pool = S.ticker.highNoto;
    else if (Game.effectiveRate(state) >= 0.5) pool = S.ticker.highPinhane;
    else pool = S.ticker.normal;
    const txt = pool[Math.floor(Math.random() * pool.length)];
    el.ticker.textContent = txt;
    const dur = Math.max(14, txt.length * 0.55);
    el.ticker.style.animation = 'none'; void el.ticker.offsetWidth;
    el.ticker.style.animation = `marquee ${dur}s linear`;
  }
  setInterval(nextTicker, 30000);
  nextTicker();

  // ================================================================
  // 3D地球儀ビュー（Googleアース風・Canvas疑似3D）
  // ================================================================
  const canvas = $('#planet');
  const ctx = canvas.getContext('2d');
  let W = 0, H = 0, cx = 0, cy = 0, R = 100;
  function resize() {
    const dpr = window.devicePixelRatio || 1;
    W = canvas.clientWidth; H = canvas.clientHeight;
    canvas.width = Math.max(1, W * dpr);
    canvas.height = Math.max(1, H * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    cx = W / 2; cy = H * 0.54; R = Math.min(W, H) * 0.40;
  }
  window.addEventListener('resize', resize);
  resize();

  // 回転（緯度経度→3D→正射投影）
  let yaw = 0.6, pitch = -0.35, yawV = 0;
  function project(lat, lon) {
    const cl = Math.cos(lat);
    const x = cl * Math.sin(lon + yaw);
    const y = Math.sin(lat);
    const z = cl * Math.cos(lon + yaw);
    const cp = Math.cos(pitch), sp = Math.sin(pitch);
    const y2 = y * cp - z * sp;
    const z2 = y * sp + z * cp;
    return { x: cx + x * R, y: cy - y2 * R, z: z2 };
  }

  const DISTRICT_POOLS = [
    ['🏠', '🏪', '🏚️'],
    ['🏬', '🏫', '🏪'],
    ['🏭', '🏗️', '📦'],
    ['🏨', '🎰', '🌆'],
    ['🏢', '🗼', '🛸'],
  ];
  const TYPE_COLOR = { giga: '#93c5fd', scooter: '#fbbf24', van: '#4ade80', yami: '#c084fc', drone: '#f472b6' };
  const TYPE_INDEX = {};
  D.workers.forEach((w, i) => { TYPE_INDEX[w.id] = i; });

  // canvasの絵文字フォント。従来は Windows 専用の "Segoe UI Emoji" しか挙げていなかったため、
  // iOSではカラー字形に解決されず、直前の fillStyle（大陸色やワーカーのドット色）を引き継いだ
  // モノクロ字形＝シルエットで描かれていた。各OSのカラー絵文字フォントを先頭から明示する。
  const EMOJI_FONT = '"Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",serif';

  // 絵文字が描けない端末で建物を図形に差し替えるときの形状。DISTRICT_POOLS の全絵文字を割り当てる。
  const EMOJI_SHAPE = {
    '🏠': 'house', '🏚️': 'house',
    '🏪': 'shop', '🏬': 'shop', '🏫': 'shop', '🎰': 'shop',
    '🏭': 'plant', '🏗️': 'plant', '📦': 'plant',
    '🏨': 'tower', '🌆': 'tower', '🏢': 'tower', '🗼': 'tower', '🛸': 'tower',
  };

  // カラー絵文字が「実際に描けたか」をピクセルで実測する。描けない端末では建物を図形描画へ
  // 自動で切り替え、原因が何であれ必ず色付きの建物が見えるようにする（手元でiOSを再現できないため）。
  // 切り分け用に ?vector=1 で強制的に図形描画、?vector=0 で強制的に絵文字描画にできる。
  const forcedVector = /[?&]vector=([01])/.exec(location.search);
  let colorEmojiOK = forcedVector ? forcedVector[1] === '0' : true;   // 実測が済むまでは絵文字で描く
  function detectColorEmoji() {
    if (forcedVector) return forcedVector[1] === '0';
    try {
      const c = document.createElement('canvas');
      c.width = 24; c.height = 24;
      const g = c.getContext('2d', { willReadFrequently: true });
      g.textAlign = 'center'; g.textBaseline = 'middle';
      g.font = `18px ${EMOJI_FONT}`;
      g.fillStyle = '#000';
      g.fillText('🏠', 12, 12);
      const d = g.getImageData(0, 0, 24, 24).data;
      for (let i = 0; i < d.length; i += 4) {
        if (d[i + 3] < 40) continue;                                    // 透明部分は無視
        const r = d[i], gg = d[i + 1], b = d[i + 2];
        if (Math.max(r, gg, b) - Math.min(r, gg, b) > 28) return true;  // 彩度あり＝カラー字形で描けている
      }
      return false;                                                     // 真っ黒＝モノクロ字形しか出せていない
    } catch (e) { return true; }                                        // 判定不能な環境では従来どおり絵文字
  }
  // フォント確定前だと誤判定するため fonts.ready 後に実行し、「描けない」と出たときだけ後追いで
  // もう一度確かめる（遅れてカラー絵文字が使えるようになる端末対策）。
  const runDetect = () => { colorEmojiOK = detectColorEmoji(); };
  if (document.fonts && document.fonts.ready) document.fonts.ready.then(runDetect, runDetect);
  else setTimeout(runDetect, 300);
  setTimeout(() => { if (!colorEmojiOK) colorEmojiOK = detectColorEmoji(); }, 2500);

  // 絵文字が使えない端末向けの建物描画。壁＋屋根＋窓を図形で描くので端末差が出ない。
  // x, y は絵文字と同じ基準（textAlign=center / textBaseline=middle のセル中心）。
  const VECTOR_STYLE = {
    house: { wall: '#fde68a', roof: '#b45309', floors: 1, wide: 0.84 },
    shop:  { wall: '#fed7aa', roof: '#c2410c', floors: 2, wide: 0.96 },
    plant: { wall: '#bfdbfe', roof: '#1d4ed8', floors: 2, wide: 1.04 },
    tower: { wall: '#c7d2fe', roof: '#3730a3', floors: 5, wide: 0.70 },
  };
  function drawVectorBuilding(x, y, size, shape) {
    const s = VECTOR_STYLE[shape] || VECTOR_STYLE.house;
    const w = size * s.wide, h = size * 0.9;
    const left = x - w / 2, top = y + size * 0.46 - h;   // 足元を絵文字セルの下端に合わせる
    ctx.save();
    ctx.fillStyle = s.wall;
    ctx.fillRect(left, top, w, h);
    ctx.fillStyle = s.roof;
    if (shape === 'house') {                             // 低層は三角屋根、それ以外は陸屋根で見分ける
      ctx.beginPath();
      ctx.moveTo(left - w * 0.09, top);
      ctx.lineTo(x, top - h * 0.32);
      ctx.lineTo(left + w + w * 0.09, top);
      ctx.closePath(); ctx.fill();
    } else {
      ctx.fillRect(left - w * 0.05, top - h * 0.08, w * 1.1, h * 0.08);
    }
    const cols = Math.max(2, Math.round(w / (size * 0.26)));
    const gapX = w / (cols + 1), gapY = h / (s.floors + 1);
    const ww = Math.max(1.1, gapX * 0.52), wh = Math.max(1.1, gapY * 0.5);
    ctx.fillStyle = '#1e3a5f';
    for (let r = 1; r <= s.floors; r++) {
      for (let c = 1; c <= cols; c++) ctx.fillRect(left + gapX * c - ww / 2, top + gapY * r - wh / 2, ww, wh);
    }
    ctx.strokeStyle = 'rgba(15,23,42,0.65)';
    ctx.lineWidth = Math.max(0.6, size * 0.035);
    ctx.strokeRect(left, top, w, h);
    ctx.restore();
  }

  // 大陸（=地区）: 決定的な地形ブロブ＋建物スロット
  function srand(seed) { let s = seed; return () => (s = (s * 9301 + 49297) % 233280) / 233280; }
  const CONTINENTS = [
    { lat: 0.15, lon: 0.0 },
    { lat: 0.55, lon: 1.3 },
    { lat: -0.40, lon: 2.5 },
    { lat: 0.10, lon: 3.8 },
    { lat: -0.15, lon: 5.1 },
  ];
  CONTINENTS.forEach((c, i) => {
    const rnd = srand(i * 777 + 13);
    c.rad = 0.55;
    c.color = `hsl(${150 + i * 30}, 30%, ${23 + i * 3}%)`;
    c.blobs = Array.from({ length: 14 }, () => ({
      lat: c.lat + (rnd() - 0.5) * 0.66,
      lon: c.lon + (rnd() - 0.5) * 0.9,
      r: 0.09 + rnd() * 0.15,
    }));
    c.slots = Array.from({ length: 8 }, (_, j) => ({
      lat: c.lat + (rnd() - 0.5) * 0.45,
      lon: c.lon + (rnd() - 0.5) * 0.55,
      emoji: DISTRICT_POOLS[i][j % 3],
      size: 16 + (j % 3) * 4,
    }));
  });
  const STARS = [];
  for (let i = 0; i < 70; i++) STARS.push({ x: Math.random(), y: Math.random() * 0.6, tw: Math.random() * TAU });

  const workers3d = []; // 地図上の人数 = 雇用数（1:1）
  const pops = [];      // 配達完了 +￥（画面座標）
  const coins = [];     // 地面に落ちている💰
  const gold = { active: false, x: 0, y: 0 };
  let planetBubble = null;

  function districtUnlocked(d) { return state.rank >= d + 1; }
  function buildingsFor(d) {
    if (!districtUnlocked(d)) return 0;
    const n = state.counts[D.workers[d].id];
    return Math.max(1, Math.min(8, Math.floor(Math.sqrt(n)) + 1));
  }

  // 雇用数と1:1で同期
  function syncWorkers3d() {
    for (const w of D.workers) {
      const want = state.counts[w.id];
      const c = CONTINENTS[TYPE_INDEX[w.id]];
      let have = 0;
      for (const x of workers3d) if (x.type === w.id) have++;
      while (have < want) {
        workers3d.push({
          type: w.id,
          k: have, // タイプ内通し番号（先頭14人は絵文字、残りはドット）
          lat: c.lat + (Math.random() - 0.5) * 0.5,
          lon: c.lon + (Math.random() - 0.5) * 0.6,
          hd: Math.random() * TAU,
          spd: 0.06 + Math.random() * 0.1,
        });
        have++;
      }
      for (let i = workers3d.length - 1; i >= 0 && have > want; i--) {
        if (workers3d[i].type === w.id) { workers3d.splice(i, 1); have--; }
      }
    }
  }
  setInterval(syncWorkers3d, 1000);
  syncWorkers3d();

  // ワーカーの声（地球上の吹き出し＋カードの吹き出し）
  setInterval(() => {
    const hired = D.workers.filter(w => state.counts[w.id] > 0);
    if (!hired.length) return;
    const w = hired[Math.floor(Math.random() * hired.length)];
    const er = Game.effectiveRate(state);
    const pool = er <= 0.25 ? S.voices.low : er <= 0.5 ? S.voices.mid : S.voices.high;
    const text = pool[Math.floor(Math.random() * pool.length)];
    const front = workers3d.filter(x => x.k < 14 && project(x.lat, x.lon).z > 0.25);
    if (front.length) {
      planetBubble = { sprite: front[Math.floor(Math.random() * front.length)], text, until: Date.now() + 4500 };
    }
    const b = document.getElementById('bubble-' + w.id);
    if (b) {
      b.textContent = text;
      b.classList.add('show');
      setTimeout(() => b.classList.remove('show'), 4200);
    }
  }, 18000);

  // 配達完了ポップ（見えている面のワーカーの場所で発生）
  setInterval(() => {
    if (document.hidden || Game.incomePerSec(state, Date.now()) <= 0) return;
    const front = [];
    for (const x of workers3d) {
      const p = project(x.lat, x.lon);
      if (p.z > 0.25) front.push(p);
      if (front.length > 30) break;
    }
    if (!front.length) return;
    const p = front[Math.floor(Math.random() * front.length)];
    pops.push({ sx: p.x, sy: p.y, life: 0 });
  }, 1600);

  // ---------- 入力（ドラッグ回転＋回収＋ゴールデン便＋地区タップ） ----------
  let dragging = false, lastX = 0, lastY = 0, dragMoved = 0, lastMoveT = 0, lastDx = 0;
  function canvasPos(e) {
    const r = canvas.getBoundingClientRect();
    return { x: e.clientX - r.left, y: e.clientY - r.top, cx: e.clientX, cy: e.clientY };
  }
  function coinPos(c, tMs) {
    const p = project(c.lat, c.lon);
    p.y -= 2 + Math.sin(tMs / 300 + c.ph) * 2;
    return p;
  }
  function syncCoins(nowMs) {
    const cap = Game.vaultCap(state, nowMs);
    const want = (state.autoCollectSec > 0 || state.vault <= 0 || cap <= 0)
      ? 0 : Math.max(1, Math.ceil(Math.min(1, state.vault / cap) * 12));
    while (coins.length < want) {
      const opts = CONTINENTS.filter((c, i) => districtUnlocked(i));
      const c = opts[Math.floor(Math.random() * opts.length)] || CONTINENTS[0];
      coins.push({
        lat: c.lat + (Math.random() - 0.5) * 0.6,
        lon: c.lon + (Math.random() - 0.5) * 0.7,
        ph: Math.random() * TAU,
      });
    }
    while (coins.length > want) coins.splice(Math.floor(Math.random() * coins.length), 1);
  }
  function tryCollectAt(p) {
    const tMs = performance.now();
    for (let i = coins.length - 1; i >= 0; i--) {
      const pos = coinPos(coins[i], tMs);
      if (pos.z < 0.05) continue;
      if ((p.x - pos.x) ** 2 + (p.y - pos.y) ** 2 < 26 * 26) {
        const amount = Game.collect(state, 1 / coins.length);
        coins.splice(i, 1);
        Sound.sfx('coin');
        floatNum(p.cx, p.cy, '+' + F(amount));
        cashPop();
        return true;
      }
    }
    return false;
  }
  function tryGoldenAt(p) {
    if (!gold.active) return false;
    if ((p.x - gold.x) ** 2 + (p.y - gold.y) ** 2 > 34 * 34) return false;
    gold.active = false;
    const r = Game.goldenHit(state, Date.now());
    Sound.sfx('golden');
    if (r.type === 'cash') {
      floatNum(p.cx, p.cy, '+' + F(r.amount), 'gold');
      toast(`✨ ${S.ui.goldenCash}`, '+' + F(r.amount));
      cashPop();
    } else {
      toast(`✨ ${S.ui.goldenCash}`, S.ui.goldenBuff);
    }
    saveNow();
    return true;
  }
  canvas.addEventListener('pointerdown', e => {
    const p = canvasPos(e);
    if (tryGoldenAt(p) || tryCollectAt(p)) { dragMoved = 99; return; }
    dragging = true; lastX = e.clientX; lastY = e.clientY; dragMoved = 0; yawV = 0;
    canvas.classList.add('dragging');
    try { canvas.setPointerCapture(e.pointerId); } catch (err) {}
  });
  canvas.addEventListener('pointermove', e => {
    const p = canvasPos(e);
    if (dragging) {
      const dx = e.clientX - lastX, dy = e.clientY - lastY;
      lastX = e.clientX; lastY = e.clientY;
      yaw += dx / R;
      pitch = Math.max(-1.1, Math.min(1.1, pitch + dy / R));
      dragMoved += Math.abs(dx) + Math.abs(dy);
      lastDx = dx; lastMoveT = performance.now();
    }
    tryCollectAt(p); // なぞる／回しながら💰を薙ぎ払える
  });
  canvas.addEventListener('pointerup', e => {
    const wasDrag = dragMoved >= 8;
    dragging = false;
    canvas.classList.remove('dragging');
    if (wasDrag) {
      if (performance.now() - lastMoveT < 90) yawV = (lastDx / R) * 22; // 慣性
      dragMoved = 0;
      return;
    }
    dragMoved = 0;
    // タップ: 島のステータス（開放済み）／解禁案内（未開放）
    const p = canvasPos(e);
    let best = null, bestDist = 42 * 42;
    for (let d = 0; d < 5; d++) {
      const c = CONTINENTS[d];
      const pos = project(c.lat, c.lon);
      if (pos.z <= 0.05) continue;
      const dd = (p.x - pos.x) ** 2 + (p.y - pos.y) ** 2;
      if (dd < bestDist) { bestDist = dd; best = d; }
    }
    if (best === null) return;
    if (districtUnlocked(best)) showIsland(best);
    else if (D.ranks[best].fullOnly && !window.IS_FULL) showCta();
    else toast('🔒 ' + S.districts[best], S.ui.districtLocked.replace('{rank}', best + 1));
  });

  // ---------- 描画ループ ----------
  let lastFrame = performance.now();
  function frame(t) {
    const dt = Math.min(0.05, (t - lastFrame) / 1000);
    lastFrame = t;
    const nowMs = Date.now();

    // 慣性回転
    if (!dragging && Math.abs(yawV) > 0.001) {
      yaw += yawV * dt;
      yawV *= Math.max(0, 1 - 3 * dt);
    }

    // --- 空（昼夜サイクル 180秒） ---
    const cyc = (nowMs / 1000 % 180) / 180;
    const day = (Math.sin(cyc * TAU - 1.57) + 1) / 2;
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, `rgb(${6 + day * 20}, ${11 + day * 34}, ${29 + day * 50})`);
    g.addColorStop(1, `rgb(${10 + day * 12}, ${16 + day * 20}, ${38 + day * 28})`);
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#e2e8f0';
    for (const st of STARS) {
      const a = (1 - day) * (0.4 + 0.6 * Math.abs(Math.sin(t / 900 + st.tw)));
      if (a < 0.05) continue;
      ctx.globalAlpha = a;
      ctx.fillRect(st.x * W, st.y * H, 1.6, 1.6);
    }
    ctx.globalAlpha = 1;
    const phi = cyc * TAU - 1.57;
    ctx.font = `22px ${EMOJI_FONT}`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    // fillStyle は必ず明示する。省くとモノクロ字形の端末で直前の星の色をそのまま引き継ぐ。
    ctx.fillStyle = '#fde68a';
    ctx.fillText('☀️', cx + Math.cos(phi) * (R + 60), cy + Math.sin(phi) * (R + 60));
    ctx.fillStyle = '#e2e8f0';
    ctx.fillText('🌙', cx + Math.cos(phi + 3.14) * (R + 60), cy + Math.sin(phi + 3.14) * (R + 60));

    // --- 大気の光 ---
    ctx.beginPath();
    ctx.arc(cx, cy, R + 5, 0, TAU);
    ctx.strokeStyle = 'rgba(56, 189, 248, .16)';
    ctx.lineWidth = 10;
    ctx.stroke();

    // --- 地球本体（海） ---
    const pg = ctx.createRadialGradient(cx - R * 0.35, cy - R * 0.35, R * 0.15, cx, cy, R);
    pg.addColorStop(0, '#17416e');
    pg.addColorStop(1, '#081a30');
    ctx.fillStyle = pg;
    ctx.beginPath(); ctx.arc(cx, cy, R, 0, TAU); ctx.fill();

    // --- 大陸と経緯線（球にクリップ） ---
    ctx.save();
    ctx.beginPath(); ctx.arc(cx, cy, R, 0, TAU); ctx.clip();
    for (let d = 0; d < 5; d++) {
      const c = CONTINENTS[d];
      ctx.fillStyle = districtUnlocked(d) ? c.color : '#0d1626';
      for (const b of c.blobs) {
        const p = project(b.lat, b.lon);
        if (p.z < 0.02) continue;
        ctx.globalAlpha = Math.min(1, p.z * 4) * 0.95;
        ctx.beginPath();
        ctx.arc(p.x, p.y, b.r * R * (0.35 + 0.65 * p.z), 0, TAU);
        ctx.fill();
      }
    }
    ctx.globalAlpha = 1;
    // 経緯線（Googleアースの雰囲気）
    ctx.strokeStyle = 'rgba(148, 163, 184, .09)';
    ctx.lineWidth = 1;
    for (let m = 0; m < 8; m++) {
      const lon = m * TAU / 8;
      ctx.beginPath();
      let pen = false;
      for (let la = -85; la <= 85; la += 6) {
        const p = project(la * Math.PI / 180, lon);
        if (p.z > 0.02) { if (pen) ctx.lineTo(p.x, p.y); else { ctx.moveTo(p.x, p.y); pen = true; } }
        else pen = false;
      }
      ctx.stroke();
    }
    for (const la of [-40, 0, 40]) {
      ctx.beginPath();
      let pen = false;
      for (let lo = 0; lo <= 360; lo += 6) {
        const p = project(la * Math.PI / 180, lo * Math.PI / 180);
        if (p.z > 0.02) { if (pen) ctx.lineTo(p.x, p.y); else { ctx.moveTo(p.x, p.y); pen = true; } }
        else pen = false;
      }
      ctx.stroke();
    }
    ctx.restore();

    // --- ワーカー移動＋ドット描画（雇用数と1:1） ---
    for (const wk of workers3d) {
      wk.hd += (Math.random() - 0.5) * 1.4 * dt;
      wk.lat += Math.cos(wk.hd) * wk.spd * dt;
      wk.lon += Math.sin(wk.hd) * wk.spd * dt;
      const c = CONTINENTS[TYPE_INDEX[wk.type]];
      const dlat = wk.lat - c.lat;
      let dlon = wk.lon - c.lon;
      dlon = ((dlon + Math.PI) % TAU + TAU) % TAU - Math.PI;
      if (dlat * dlat + dlon * dlon > 0.12) wk.hd = Math.atan2(-dlon, -dlat);
      if (wk.k >= 14) {
        const p = project(wk.lat, wk.lon);
        if (p.z > 0.03) {
          ctx.globalAlpha = 0.35 + 0.6 * p.z;
          ctx.fillStyle = TYPE_COLOR[wk.type];
          const s = 2.6 * (0.6 + 0.5 * p.z);
          ctx.fillRect(p.x - s / 2, p.y - s / 2, s, s);
        }
      }
    }
    ctx.globalAlpha = 1;

    // --- スプライト（建物・ロック・ワーカー絵文字・💰）を奥から描画 ---
    const sprites = [];
    for (let d = 0; d < 5; d++) {
      const c = CONTINENTS[d];
      const bn = buildingsFor(d);
      for (let j = 0; j < bn; j++) {
        const s = c.slots[j];
        const p = project(s.lat, s.lon);
        // shape を持つスプライトは、絵文字が描けない端末で図形の建物に差し替わる
        if (p.z > 0.05) sprites.push({ p, emoji: s.emoji, size: s.size, shape: EMOJI_SHAPE[s.emoji], color: '#e2e8f0' });
      }
      if (!districtUnlocked(d)) {
        const p = project(c.lat, c.lon);
        if (p.z > 0.05) {
          const locked = D.ranks[d].fullOnly && !window.IS_FULL;
          sprites.push({ p, emoji: locked ? '👑' : '🔒', size: 22, color: locked ? '#fbbf24' : '#cbd5e1' });
        }
      }
    }
    for (const wk of workers3d) {
      if (wk.k >= 14) continue;
      const p = project(wk.lat, wk.lon);
      if (p.z > 0.05) sprites.push({ p, emoji: D.workers[TYPE_INDEX[wk.type]].emoji, size: 15, ref: wk, color: TYPE_COLOR[wk.type] });
    }
    const tMs = performance.now();
    for (const c of coins) {
      const p = coinPos(c, tMs);
      if (p.z > 0.05) sprites.push({ p, emoji: '💰', size: 19, color: '#fbbf24' });
    }
    sprites.sort((a, b) => a.p.z - b.p.z);
    for (const s of sprites) {
      const px = Math.round(s.size * (0.55 + 0.5 * s.p.z));
      if (!colorEmojiOK && s.shape) { drawVectorBuilding(s.p.x, s.p.y, px, s.shape); continue; }
      ctx.font = `${px}px ${EMOJI_FONT}`;
      // モノクロ字形の端末でも大陸色やワーカーのドット色を引き継がないよう毎回明示する
      ctx.fillStyle = s.color;
      ctx.fillText(s.emoji, s.p.x, s.p.y);
    }

    // --- 配達ポップ ---
    for (let i = pops.length - 1; i >= 0; i--) {
      const p = pops[i];
      p.life += dt;
      if (p.life > 1) { pops.splice(i, 1); continue; }
      ctx.globalAlpha = 1 - p.life;
      ctx.fillStyle = '#4ade80';
      ctx.font = 'bold 11px sans-serif';
      ctx.fillText('+￥', p.sx, p.sy - p.life * 22);
      ctx.globalAlpha = 1;
    }

    // --- ゴールデン便（上下左右斜めランダムに登場して画面を横断） ---
    if (!gold.active && nowMs >= state.nextGoldenAt && !document.hidden && !endingOpen()) {
      gold.active = true;
      const ang = Math.random() * 6.283;                 // 進行方向（全方位）
      const speed = 180 + Math.random() * 120;
      gold.vx = Math.cos(ang) * speed;
      gold.vy = Math.sin(ang) * speed;
      const off = Math.hypot(W, H) * 0.6;                // 画面外の出発点（進行方向の反対側）
      gold.x = cx - Math.cos(ang) * off + (Math.random() - 0.5) * W * 0.3;
      gold.y = cy - Math.sin(ang) * off + (Math.random() - 0.5) * H * 0.3;
    }
    if (gold.active) {
      gold.x += gold.vx * dt;
      gold.y += gold.vy * dt;
      const m = 90;
      if (gold.x < -m || gold.x > W + m || gold.y < -m || gold.y > H + m) {
        gold.active = false; Game.scheduleGolden(state, nowMs);
      } else {
        ctx.save();
        ctx.translate(gold.x, gold.y);
        if (gold.vx > 0) ctx.scale(-1, 1);               // 🚚は既定で左向き→右進行時は反転して進行方向を向く
        ctx.shadowColor = '#fbbf24'; ctx.shadowBlur = 18;
        ctx.font = `28px ${EMOJI_FONT}`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        // fillStyle は必ず明示（省くと直前の「+￥」の緑を引き継いだシルエットになる）
        ctx.fillStyle = '#fbbf24';
        ctx.fillText('🚚', 0, 0);
        ctx.restore();
        ctx.globalAlpha = 0.5 + 0.5 * Math.sin(t / 90);
        ctx.font = `16px ${EMOJI_FONT}`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillStyle = '#fde68a';
        ctx.fillText('✨', gold.x - 22, gold.y - 12);
        ctx.fillText('✨', gold.x + 22, gold.y + 12);
        ctx.globalAlpha = 1;
      }
    }

    // --- ワーカーの声（吹き出し） ---
    if (planetBubble && planetBubble.until > nowMs && workers3d.includes(planetBubble.sprite)) {
      const sp = planetBubble.sprite;
      const p = project(sp.lat, sp.lon);
      if (p.z > 0.05) {
        ctx.font = '11px sans-serif';
        const tw = ctx.measureText(planetBubble.text).width;
        const bw = tw + 16, bh = 20;
        const rx = Math.max(4, Math.min(W - bw - 4, p.x - bw / 2));
        const ry = Math.max(48, p.y - 36);
        ctx.fillStyle = 'rgba(241, 245, 249, .95)';
        ctx.beginPath();
        if (ctx.roundRect) ctx.roundRect(rx, ry, bw, bh, 8); else ctx.rect(rx, ry, bw, bh);
        ctx.fill();
        ctx.fillStyle = '#0f172a';
        ctx.textAlign = 'left';
        ctx.fillText(planetBubble.text, rx + 8, ry + bh / 2);
        ctx.textAlign = 'center';
      }
    } else if (planetBubble && planetBubble.until <= nowMs) {
      planetBubble = null;
    }

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  // ================================================================
  // HUD＆カード描画
  // ================================================================
  let dispCash = state.cash;
  function render(nowMs) {
    dispCash += (state.cash - dispCash) * 0.35;
    if (Math.abs(dispCash - state.cash) < 1) dispCash = state.cash;
    const income = Game.incomePerSec(state, nowMs);
    el.cash.textContent = F(dispCash);
    el.cash.classList.toggle('earning', income > 0);
    el.income.textContent = F(income) + S.ui.perSec;
    el.revenue.textContent = F(Game.revenuePerSec(state)) + S.ui.perSec;
    el.effrate.textContent = (Game.effectiveRate(state) * 100).toFixed(0) + '%';
    el.exploited.textContent = F(state.lifetimeIncome);
    el.notoNum.textContent = state.noto.toFixed(0) + ' / 100';
    el.notoFill.style.width = Math.min(100, state.noto) + '%';
    el.rankLine.textContent = `ランク${state.rank}：${S.ranks[state.rank - 1].name}`;

    const act = state.buffs.filter(b => b.until > nowMs);
    if (act.length) {
      const mult = act.reduce((m, b) => m * b.mult, 1);
      const sec = Math.ceil((Math.max(...act.map(b => b.until)) - nowMs) / 1000);
      el.buffLine.textContent = S.ui.buffActive.replace('{mult}', mult.toFixed(1).replace(/\.0$/, '')).replace('{sec}', sec);
    } else el.buffLine.textContent = '';

    if (state.autoCollectSec > 0) {
      const mm = Math.floor(state.autoCollectSec / 60), ss = Math.floor(state.autoCollectSec % 60);
      el.vaultNum.textContent = S.ui.autoActive
        .replace('{time}', mm + ':' + String(ss).padStart(2, '0'))
        .replace('{fee}', Math.round(D.autoFeePct * 100));
      el.vaultFill.style.width = '0%';
      el.vaultWarn.textContent = '';
      el.collectHint.style.display = 'none';
    } else {
      const cap = Game.vaultCap(state, nowMs);
      el.vaultNum.textContent = F(state.vault);
      const fill = cap > 0 ? Math.min(100, state.vault / cap * 100) : 0;
      el.vaultFill.style.width = fill + '%';
      el.vaultWarn.textContent = fill >= 98 ? S.ui.vaultFull : '';
      el.collectHint.style.display = '';
    }

    if (state.renown > 0) {
      el.renown.style.display = '';
      el.renown.textContent = `👤 ${S.ui.renown} ${state.renown}pt（${S.ui.renownBonus}+${state.renown * 10}%）`;
    } else el.renown.style.display = 'none';

    // 労働者カード（段階的アンロック）
    let hireNotify = false;
    for (const w of D.workers) {
      const c = wCards[w.id];
      const vis = Game.workerVisibility(state, w.id);
      c.card.style.display = vis === 'hidden' ? 'none' : '';
      if (vis === 'hidden') continue;
      if (vis === 'teaser') {
        c.card.classList.add('teaser');
        c.card.classList.remove('locked', 'owned');
        c.emoji.textContent = '❓';
        c.name.textContent = '？？？';
        c.count.textContent = '';
        c.crew.innerHTML = '';
        c.lastCount = -1;
        c.take.textContent = S.ui.teaserWorker;
        c.flavor.textContent = '';
        c.btn.textContent = '？？？';
        c.btn.disabled = true;
        continue;
      }
      c.card.classList.remove('teaser');
      c.emoji.textContent = w.emoji;
      c.name.textContent = S.workers[w.id].name;
      const rate = Game.pinhaneRate(state, w.id);
      c.count.textContent = state.counts[w.id] + S.ui.count;
      if (c.lastCount !== state.counts[w.id]) {
        c.lastCount = state.counts[w.id];
        const n = Math.min(state.counts[w.id], 10);
        c.crew.innerHTML = Array.from({ length: n }, () => `<span>${w.emoji}</span>`).join('') +
          (state.counts[w.id] > 10 ? ` <span class="crew-more">×${state.counts[w.id]}</span>` : '');
      }
      c.take.textContent = `1人あたり ${S.ui.unitIncome} ${F(w.base * state.prodMult[w.id] * rate / 100)}${S.ui.perSec}・${S.ui.pinhaneRate} ${rate}%`;
      c.flavor.textContent = S.workers[w.id].flavor;
      if (w.fullOnly && !window.IS_FULL) {
        c.card.classList.add('locked');
        c.btn.textContent = S.ui.lockedFull;
        c.btn.disabled = true;
      } else if (state.rank < w.unlockRank) {
        c.card.classList.add('locked');
        c.btn.textContent = `ランク${w.unlockRank}で解禁`;
        c.btn.disabled = true;
      } else {
        c.card.classList.remove('locked');
        const cost = Game.workerCost(state, w.id);
        c.btn.textContent = `${S.ui.hire}（${F(cost)}）`;
        c.btn.disabled = state.cash < cost;
        if (!c.btn.disabled) hireNotify = true;
      }
    }

    // アップグレードカード（段階的アンロック）
    let upgNotify = false;
    for (const u of D.upgrades) {
      const c = uCards[u.id];
      const vis = Game.upgradeVisibility(state, u.id);
      c.card.style.display = vis === 'hidden' ? 'none' : '';
      if (vis === 'hidden') continue;
      if (vis === 'teaser') {
        c.card.classList.add('teaser');
        c.card.classList.remove('locked', 'owned');
        c.title.textContent = '？？？';
        c.effect.textContent = S.ui.teaserUpgrade;
        c.flavor.textContent = '';
        c.btn.textContent = '？？？';
        c.btn.disabled = true;
        continue;
      }
      c.card.classList.remove('teaser');
      const oneShot = u.kind !== 'pr' && u.kind !== 'welfare' && u.kind !== 'safe';
      if (u.fullOnly && !window.IS_FULL) {
        c.card.classList.add('locked');
        c.title.textContent = c.su.name;
        c.effect.textContent = c.su.effect;
        c.flavor.textContent = '';
        c.btn.textContent = S.ui.lockedFull;
        c.btn.disabled = true;
      } else if (u.needNoto && state.noto < u.needNoto && !state.owned[u.id]) {
        c.card.classList.add('locked');
        c.title.textContent = '？？？';
        c.effect.textContent = S.ui.lockedNoto;
        c.flavor.textContent = '';
        c.btn.textContent = '？？？';
        c.btn.disabled = true;
      } else if (oneShot && state.owned[u.id]) {
        c.card.classList.remove('locked');
        c.card.classList.add('owned');
        c.title.innerHTML = `${c.su.name}　<span class="owned-mark">✓ ${S.ui.purchased}</span>`;
        c.effect.textContent = c.su.effect;
        c.flavor.textContent = c.su.flavor;
        c.btn.textContent = S.ui.purchased;
        c.btn.disabled = true;
      } else {
        c.card.classList.remove('locked', 'owned');
        c.title.textContent = c.su.name;
        c.effect.textContent = c.su.effect;
        c.flavor.textContent = c.su.flavor;
        const cost = Game.upgradeCost(state, u.id);
        c.btn.textContent = `施行する（${F(cost)}）`;
        c.btn.disabled = state.cash < cost;
        if (!c.btn.disabled) upgNotify = true;
      }
    }

    // ランク／転生
    let orgNotify = false;
    if (state.ending) {
      rankTitle.textContent = S.endings[state.ending].title;
      rankDesc2.textContent = S.ranks[4].desc;
      rankBtn.textContent = `${S.ui.prestigeBtn}（${S.ui.renown} +${Game.prestigeGain(state)}pt）`;
      rankBtn.disabled = false;
    } else if (state.rank >= 5) {
      rankTitle.textContent = S.ranks[4].name;
      rankDesc2.textContent = S.ranks[4].desc;
      rankBtn.textContent = '—';
      rankBtn.disabled = true;
    } else {
      const next = D.ranks[state.rank];
      rankTitle.textContent = `ランク${next.level}：${S.ranks[next.level - 1].name}（${S.districts[next.level - 1]}開放）`;
      rankDesc2.textContent = S.ranks[next.level - 1].desc;
      if (Game.nextRankLocked(state)) {
        rankBtn.textContent = S.ui.lockedFull;
        rankBtn.disabled = false; // 押すとCTA
      } else {
        rankBtn.textContent = `${S.ui.rankUp}（${F(next.cost)}）`;
        rankBtn.disabled = state.cash < next.cost;
        if (!rankBtn.disabled) orgNotify = true;
      }
    }
    el.btnHire.classList.toggle('notify', hireNotify);
    el.btnUpg.classList.toggle('notify', upgNotify);
    el.btnOrg.classList.toggle('notify', orgNotify);
  }

  // ---------- アンロック演出 ----------
  function processReveals() {
    const newly = Game.updateReveals(state);
    if (!newly.length) return;
    for (const key of newly) {
      const isW = key.startsWith('w_');
      const id = key.slice(2);
      const card = isW ? wCards[id].card : uCards[id].card;
      card.style.display = '';
      card.classList.remove('teaser');
      card.classList.add('unlocking');
      setTimeout(() => card.classList.remove('unlocking'), 1100);
      Sound.sfx('unlock');
      toast('🔓 ' + (isW ? S.ui.unlockWorker : S.ui.unlockUpgrade),
        isW ? S.workers[id].name : S.upgrades[id].name);
    }
    saveNow();
  }

  // ---------- メインループ ----------
  let last = Date.now(), saveAcc = 0, achAcc = 0, revAcc = 0;
  let prevAuto = state.autoCollectSec > 0;
  setInterval(() => {
    const nowMs = Date.now();
    // タイトル画面を眺めている間は時間を進めない（放置ゲームなので、
    // 止めないと「はじめる」前に収入が溜まり、セーブまで書き換わってしまう）。
    if (titleOpen) { last = nowMs; return; }
    let dt = (nowMs - last) / 1000;
    last = nowMs;
    if (dt < 0) dt = 0;
    if (dt > 1) dt = 1; // 非アクティブ分はオフライン収益に任せる
    Game.tick(state, dt, nowMs);
    if (prevAuto && state.autoCollectSec <= 0) {
      toast('🤖 契約終了', S.ui.autoExpired);
      Sound.sfx('unlock');
    }
    prevAuto = state.autoCollectSec > 0;
    syncCoins(nowMs);
    maybeEvent(nowMs);
    achAcc += dt;
    if (achAcc >= 1) {
      achAcc = 0;
      for (const id of Game.checkAchievements(state, nowMs)) {
        Sound.sfx('ach');
        toast(`🏆 ${S.ui.achievementUnlocked}`, S.achievements[id].name);
      }
    }
    revAcc += dt;
    if (revAcc >= 0.5) { revAcc = 0; processReveals(); }
    saveAcc += dt;
    if (saveAcc >= 5) { saveAcc = 0; saveNow(); }
    render(nowMs);
  }, 100);

  window.addEventListener('beforeunload', saveNow);
  document.addEventListener('visibilitychange', () => { if (document.hidden) saveNow(); });

  // ================================================================
  // 初回チュートリアル（専務が基本ループを一周させる。スキップ可・完了は端末に記録）
  // ================================================================
  const TUT_KEY = 'pinhane_tutorial_done';
  // 対象は「稼ぐ→雇う→回収→強化⇔悪評→島の管理」の順。文面は S.tutorial.steps と1:1で対応する。
  const TUTORIAL_TARGETS = ['#click-btn', '#btn-hire', '#vault-wrap', '#btn-upg', '#noto-wrap', '#collect-hint'];
  let tutIdx = -1, tutBubble = null;

  function startTutorial() { tutIdx = 0; renderTutStep(); }
  function endTutorial() {
    try { localStorage.setItem(TUT_KEY, '1'); } catch (e) {}
    clearTutStep();
    tutIdx = -1;
  }
  function clearTutStep() {
    if (tutBubble) { tutBubble.remove(); tutBubble = null; }
    document.querySelectorAll('.tut-hl').forEach(e => e.classList.remove('tut-hl'));
  }
  // 表示されている（実サイズを持つ）対象だけを案内する。自動回収中で隠れる #collect-hint 等は飛ばす。
  function visibleTutTarget(sel) {
    const e = $(sel);
    if (!e) return null;
    const r = e.getBoundingClientRect();
    return (r.width > 0 && r.height > 0) ? e : null;
  }
  function renderTutStep() {
    if (tutIdx < 0) return;
    clearTutStep();
    if (tutIdx >= TUTORIAL_TARGETS.length) { endTutorial(); return; }
    const target = visibleTutTarget(TUTORIAL_TARGETS[tutIdx]);
    if (!target) { tutIdx += 1; renderTutStep(); return; }
    const last = tutIdx === TUTORIAL_TARGETS.length - 1;
    target.classList.add('tut-hl');
    tutBubble = document.createElement('div');
    tutBubble.className = 'tut-bubble';
    tutBubble.innerHTML = `<div class="tut-box">
      <div class="tut-head">${S.tutorial.speaker}（${tutIdx + 1}/${TUTORIAL_TARGETS.length}）</div>
      <div class="tut-text">${S.tutorial.steps[tutIdx]}</div>
      <div class="tut-btns">
        <button class="tut-next">${last ? S.tutorial.start : S.tutorial.next}</button>
        <button class="tut-skip">${S.tutorial.skip}</button>
      </div>
      <div class="tut-arrow"></div>
    </div>`;
    document.body.appendChild(tutBubble);
    placeTutBubble(tutBubble, target.getBoundingClientRect());
    tutBubble.querySelector('.tut-next').onclick = () => { Sound.sfx('press'); tutIdx += 1; renderTutStep(); };
    tutBubble.querySelector('.tut-skip').onclick = () => { Sound.sfx('press'); endTutorial(); };
  }

  // 吹き出しを「対象に重ならない空いている側」に置き、対象を指す三角を出す
  // （レバレッジ・マスター v3.12 と同じ方式。狭い画面で対象や情報バーに被るのを防ぐ）。
  function placeTutBubble(bubble, r) {
    const vw = window.innerWidth, vh = window.innerHeight, M = 8, GAP = 12, A = 8;
    const MT = 48;                                      // 固定ヘッダー（高さ44px）を避ける上端の下限
    const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
    const w = Math.min(268, vw - M * 2);
    bubble.style.width = w + 'px';
    const h = bubble.offsetHeight;                      // 幅を決めてから実測する
    let left, top, dir;
    if (r.right + w + GAP <= vw - M) {                  // 対象の右に置く（HUD・左下ボタン）
      dir = 'left'; left = r.right + GAP; top = clamp(r.top - 10, MT, vh - h - M);
    } else if (r.left - w - GAP >= M) {                 // 対象の左に置く（右側のサイドボタン）
      dir = 'right'; left = r.left - w - GAP; top = clamp(r.top - 10, MT, vh - h - M);
    } else if (r.top - h - GAP >= MT) {                 // 対象の上に置く
      dir = 'down'; left = clamp(r.left + r.width / 2 - w / 2, M, vw - w - M); top = r.top - h - GAP;
    } else {                                            // 対象の下に置く
      dir = 'up'; left = clamp(r.left + r.width / 2 - w / 2, M, vw - w - M); top = clamp(r.bottom + GAP, MT, vh - h - M);
    }
    bubble.style.left = Math.round(left) + 'px';
    // 上に置くときは下端を基準にする。文字が折り返して高さが伸びても上へ伸びるだけで対象に被らない。
    if (dir === 'down') { bubble.style.top = 'auto'; bubble.style.bottom = Math.round(vh - r.top + GAP) + 'px'; }
    else { bubble.style.bottom = 'auto'; bubble.style.top = Math.round(top) + 'px'; }
    const ax = clamp(r.left + r.width / 2 - left, 16, w - 16);
    const ay = clamp(r.top + r.height / 2 - top, 16, h - 16);
    const arrow = bubble.querySelector('.tut-arrow');
    const G = '#fbbf24';
    if (dir === 'down')       arrow.style.cssText = `left:${ax - A}px;bottom:${-A * 2}px;border-left:${A}px solid transparent;border-right:${A}px solid transparent;border-top:${A * 2}px solid ${G};`;
    else if (dir === 'up')    arrow.style.cssText = `left:${ax - A}px;top:${-A * 2}px;border-left:${A}px solid transparent;border-right:${A}px solid transparent;border-bottom:${A * 2}px solid ${G};`;
    else if (dir === 'right') arrow.style.cssText = `top:${ay - A}px;right:${-A * 2}px;border-top:${A}px solid transparent;border-bottom:${A}px solid transparent;border-left:${A * 2}px solid ${G};`;
    else                      arrow.style.cssText = `top:${ay - A}px;left:${-A * 2}px;border-top:${A}px solid transparent;border-bottom:${A}px solid transparent;border-right:${A * 2}px solid ${G};`;
    bubble.style.visibility = 'visible';
  }

  // 画面回転・リサイズで対象の位置が変わるため、表示中のステップを置き直す
  window.addEventListener('resize', () => { if (tutIdx >= 0) renderTutStep(); });
  $('#help-btn').onclick = () => { Sound.sfx('press'); startTutorial(); };

  // ================================================================
  // タイトル画面
  // 構図: 下に夜の摩天楼（＝帝国）、その足元をワーカーが延々と流れ、そこから💰が
  // 上の👑へ吸い上がっていく。「働かせて、上澄みを取る」をそのまま一枚の絵にしている。
  // ================================================================
  function showTitle(hasSave) {
    // 摩天楼。中央ほど高くして、真ん中の1本だけ本社ビル（赤灯付き）にする。
    const N = 23, mid = (N - 1) / 2;
    const bldgs = Array.from({ length: N }, (_, i) => {
      const center = 1 - Math.abs(i - mid) / mid;                 // 中央=1, 端=0
      const h = Math.round(30 + center * 118 + ((i * 37) % 11) * 4); // 決まった見た目にするため擬似乱数
      const w = 20 + ((i * 53) % 4) * 6;
      const hq = i === mid;
      return `<div class="ttl-bldg${hq ? ' hq' : ''}" style="height:${hq ? h + 34 : h}px;width:${hq ? 34 : w}px">${hq ? '<span class="ttl-hqlight"></span>' : ''}</div>`;
    }).join('');
    // ワーカーの列。同じ並びを2本つないで無限スクロールさせる。
    const line = Array.from({ length: 14 }, (_, i) =>
      `<span class="ttl-worker" style="animation-delay:${(i * 0.17).toFixed(2)}s">${['🚲', '🛵', '🚚', '🛵', '🚲', '🕶️'][i % 6]}</span>`).join('');
    const coins = Array.from({ length: 9 }, (_, i) =>
      `<div class="ttl-coin" style="left:${(9 + i * 10).toFixed(0)}%;animation-delay:${(i * 0.55).toFixed(2)}s">💰</div>`).join('');

    const scr = document.createElement('div');
    scr.id = 'title-screen';
    scr.innerHTML = `
      <div class="ttl-glow"></div>
      <div class="ttl-city">${bldgs}</div>
      <div class="ttl-crowd"><div class="ttl-crowd-track">
        <div class="ttl-crowd-half">${line}</div><div class="ttl-crowd-half">${line}</div>
      </div></div>
      <div class="ttl-coins">${coins}</div>
      <div class="ttl-logo">
        <div class="ttl-crown">👑</div>
        <div class="ttl-name">${S.ui.title}</div>
        <div class="ttl-sub">${S.ui.subtitle.replace(/[〜~]/g, '').trim()}</div>
        <div class="ttl-rule"></div>
        <div class="ttl-tagline">${S.titleScreen.tagline}</div>
      </div>
      <div class="ttl-btns">
        ${hasSave
          ? `<button class="ttl-btn" id="ttl-continue">${S.titleScreen.continue}</button>
             <button class="ttl-btn sub" id="ttl-new">${S.titleScreen.newGame}</button>`
          : `<button class="ttl-btn" id="ttl-start">${S.titleScreen.start}</button>`}
      </div>
      <div class="ttl-foot">ver ${window.APP_VERSION}${window.IS_FULL ? '' : '（無料版）'}</div>`;
    document.body.appendChild(scr);

    const enter = () => {
      Sound.sfx('press');                                // pointerdown で BGM も走り出す
      scr.classList.add('leaving');
      titleOpen = false;                                 // ここから時間が動き出す
      setTimeout(() => { scr.remove(); beginGame(); }, 320);
    };
    scr.querySelector('#ttl-start')?.addEventListener('click', enter);
    scr.querySelector('#ttl-continue')?.addEventListener('click', enter);
    scr.querySelector('#ttl-new')?.addEventListener('click', () => {
      if (!confirm(S.titleScreen.newConfirm)) return;
      resetting = true;
      try { localStorage.removeItem(SAVE_KEY); localStorage.removeItem(TUT_KEY); } catch (e) {}
      location.reload();
    });
  }

  // タイトルを抜けた後に走る導入。おかえり→チュートリアルの順に出す。
  function beginGame() {
    if (offline) {
      const reason = S.skimReasons[Math.floor(Math.random() * S.skimReasons.length)];
      const m = openModal(`
        <h3>💼 ${S.ui.offlineTitle}</h3>
        <p>${S.ui.offlineGross}：<span class="num">${F(offline.gross)}</span><br>
        ${S.ui.offlineSkim.replace('{reason}', reason)}：<span class="skim">-${F(offline.skim)}</span><br>
        ${S.ui.offlineNet}：<span class="num">${F(offline.net)}</span></p>
        <button class="modal-close" id="offline-ok">${S.ui.offlineTake}</button>`);
      m.querySelector('#offline-ok').onclick = closeModal;
    }
    let tutDone = true;
    try { tutDone = localStorage.getItem(TUT_KEY) === '1'; } catch (e) {}
    if (!tutDone) startTutorial();
  }

  // ---------- 起動時 ----------
  render(bootNow);
  let hasSave = false;
  try { hasSave = !!localStorage.getItem(SAVE_KEY); } catch (e) {}
  showTitle(hasSave);
})();

</script>
</body>
</html>
