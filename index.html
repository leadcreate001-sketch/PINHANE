<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ピンハネ帝国 〜プラットフォームの支配者〜</title>
<style>:root {
  --bg: #0f172a; --panel: #1e293b; --panel2: #273449; --line: #334155;
  --text: #f1f5f9; --sub: #94a3b8; --accent: #38bdf8; --money: #4ade80;
  --bad: #f87171; --gold: #fbbf24;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
body {
  background: #060b1d;
  color: var(--text);
  font-family: "Segoe UI", "Hiragino Sans", "Yu Gothic UI", Meiryo, sans-serif;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}
button { font-family: inherit; }

/* ---------- ヘッダー（スリム） ---------- */
header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 30; height: 44px;
  display: flex; align-items: center; gap: 8px; padding: 0 12px;
  background: rgba(6, 11, 29, .8); border-bottom: 1px solid var(--line);
  backdrop-filter: blur(4px);
}
header h1 { font-size: 15px; margin: 0; letter-spacing: 1px; white-space: nowrap; }
header h1 .subtitle { font-size: 10px; color: var(--sub); font-weight: normal; margin-left: 6px; }
.header-spacer { flex: 1; }
.renown-badge {
  background: linear-gradient(135deg, #3b2f1e, #1e293b); border: 1px solid var(--gold);
  color: var(--gold); border-radius: 999px; padding: 2px 10px; font-size: 11px; white-space: nowrap;
}
.full-link {
  color: var(--gold); text-decoration: none; font-size: 11px; white-space: nowrap;
  border: 1px solid var(--gold); border-radius: 999px; padding: 2px 10px;
}
.icon-btn {
  background: var(--panel); color: var(--text); border: 1px solid var(--line);
  border-radius: 8px; padding: 3px 8px; cursor: pointer; font-size: 12px; white-space: nowrap;
}

/* ---------- 惑星キャンバス ---------- */
#planet {
  position: fixed; inset: 44px 0 26px 0; width: 100%; height: calc(100% - 70px);
  display: block; cursor: grab; z-index: 1;
}
#planet.dragging { cursor: grabbing; }

/* ---------- HUD（左上フロート） ---------- */
#hud {
  position: fixed; top: 54px; left: 10px; z-index: 20; width: 250px;
  background: rgba(15, 23, 42, .82); border: 1px solid var(--line); border-radius: 14px;
  padding: 12px 14px; backdrop-filter: blur(4px);
}
#cash { font-size: 26px; font-weight: bold; color: var(--money); display: block; line-height: 1.2; }
#cash.cash-pop { animation: cashPop .28s ease-out; }
#cash.earning { text-shadow: 0 0 14px rgba(74, 222, 128, .5); }
@keyframes cashPop { 0% { transform: scale(1); } 45% { transform: scale(1.08); } 100% { transform: scale(1); } }
.stat-row { display: flex; justify-content: space-between; align-items: baseline; margin: 3px 0; font-size: 12px; }
.stat-row .label { color: var(--sub); }
#income { color: var(--money); }
#rank-line { font-size: 12px; color: var(--accent); font-weight: bold; margin-bottom: 4px; }
#buff-line { font-size: 11px; color: var(--gold); min-height: 14px; }
.vault-wrap { margin-top: 8px; }
.vault-head { display: flex; justify-content: space-between; font-size: 11px; color: var(--sub); }
#vault-num { color: var(--gold); font-weight: bold; }
.vault-track { height: 9px; background: #0b1120; border-radius: 999px; overflow: hidden; border: 1px solid var(--line); margin-top: 3px; }
#vault-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #a16207, var(--gold)); transition: width .3s; }
#vault-full-warn { font-size: 11px; color: var(--bad); min-height: 14px; font-weight: bold; }
.noto-wrap { margin-top: 6px; }
.noto-track { height: 7px; background: #0b1120; border-radius: 999px; overflow: hidden; border: 1px solid var(--line); margin-top: 3px; }
#noto-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #f59e0b, var(--bad)); transition: width .4s; }
#collect-hint { font-size: 10px; color: var(--sub); margin-top: 6px; text-align: center; }

/* ---------- 手動配達ボタン（左下） ---------- */
#click-btn {
  position: fixed; left: 12px; bottom: 40px; z-index: 20;
  padding: 13px 18px; font-size: 14px; font-weight: bold;
  color: #052e16; background: linear-gradient(135deg, #4ade80, #22c55e);
  border: none; border-radius: 14px; cursor: pointer;
  box-shadow: 0 4px 0 #15803d; user-select: none;
}
#click-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #15803d; }

/* ---------- サイドメニューボタン（右下） ---------- */
#side-btns { position: fixed; right: 12px; bottom: 40px; z-index: 20; display: flex; flex-direction: column; gap: 8px; }
#side-btns button {
  position: relative; min-width: 92px; padding: 11px 14px; font-size: 13px; font-weight: bold;
  color: var(--text); background: rgba(30, 41, 59, .9); border: 1px solid var(--line);
  border-radius: 12px; cursor: pointer; text-align: left; backdrop-filter: blur(4px);
}
#side-btns button:hover { border-color: var(--accent); }
#side-btns button .dot {
  position: absolute; top: -4px; right: -4px; width: 12px; height: 12px; border-radius: 50%;
  background: var(--bad); border: 2px solid #060b1d; display: none;
}
#side-btns button.notify .dot { display: block; animation: dotPulse 1.2s infinite; }
@keyframes dotPulse { 50% { transform: scale(1.25); } }

/* ---------- 引き出しパネル ---------- */
#drawer-overlay { position: fixed; inset: 0; z-index: 39; background: rgba(2, 6, 23, .45); display: none; }
#drawer-overlay.open { display: block; }
#drawer {
  position: fixed; top: 44px; right: 0; bottom: 26px; z-index: 40; width: 400px; max-width: 92vw;
  background: rgba(15, 23, 42, .97); border-left: 1px solid var(--line);
  transform: translateX(105%); transition: transform .25s ease-out;
  display: flex; flex-direction: column;
}
#drawer.open { transform: none; }
.drawer-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; border-bottom: 1px solid var(--line);
}
.drawer-head span { font-size: 14px; font-weight: bold; color: var(--accent); letter-spacing: 1px; }
#drawer-close { background: none; border: 1px solid var(--line); color: var(--sub); border-radius: 8px; padding: 4px 10px; cursor: pointer; }
#drawer-body { overflow-y: auto; padding: 10px 14px 20px; flex: 1; }
.drawer-page { display: none; }
.drawer-page.active { display: block; }

/* ---------- カード ---------- */
.card {
  background: var(--panel2); border: 1px solid var(--line); border-radius: 10px;
  padding: 10px 12px; margin: 8px 0; position: relative;
}
.card .card-title { font-size: 14px; font-weight: bold; }
.card .card-sub { font-size: 12px; color: var(--sub); margin: 3px 0; }
.card .card-flavor { font-size: 11px; color: #64748b; font-style: italic; margin-top: 2px; }
.card .emoji { font-size: 18px; margin-right: 4px; }
.card .count { color: var(--accent); font-weight: bold; }
.buy-btn {
  margin-top: 8px; width: 100%; padding: 8px; border: none; border-radius: 8px;
  background: linear-gradient(135deg, #38bdf8, #0ea5e9); color: #082f49;
  font-weight: bold; font-size: 13px; cursor: pointer;
}
.buy-btn:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
.card.locked { opacity: .55; }
.card.owned { border-color: #14532d; }
.owned-mark { color: var(--money); font-size: 12px; font-weight: bold; }
.card.teaser { opacity: .8; border-style: dashed; border-color: #475569; }
.card.teaser .card-title { color: var(--sub); }
.card.unlocking { animation: unlockFlash 1s ease-out; }
@keyframes unlockFlash {
  0% { box-shadow: 0 0 0 rgba(251, 191, 36, 0); transform: scale(.97); }
  35% { box-shadow: 0 0 26px rgba(251, 191, 36, .85); border-color: var(--gold); transform: scale(1.03); }
  100% { box-shadow: 0 0 0 rgba(251, 191, 36, 0); transform: scale(1); }
}
.crew { font-size: 14px; letter-spacing: 2px; line-height: 1.3; min-height: 18px; margin-top: 2px; }
.crew span { display: inline-block; animation: bob 1.1s ease-in-out infinite alternate; }
.crew span:nth-child(2n) { animation-delay: .28s; }
.crew span:nth-child(3n) { animation-delay: .55s; }
.crew span:nth-child(5n) { animation-delay: .8s; }
.crew .crew-more { color: var(--sub); font-size: 11px; animation: none; }
@keyframes bob { from { transform: translateY(0); } to { transform: translateY(-4px); } }
.bubble {
  position: absolute; right: 8px; top: -14px; max-width: 65%;
  background: #f1f5f9; color: #0f172a; font-size: 11px; border-radius: 10px;
  padding: 5px 9px; opacity: 0; transition: opacity .4s; pointer-events: none; z-index: 5;
}
.bubble.show { opacity: 1; }

/* ---------- ティッカー ---------- */
#ticker-bar {
  position: fixed; left: 0; right: 0; bottom: 0; height: 26px;
  background: #0b1120; border-top: 1px solid var(--line);
  overflow: hidden; z-index: 25;
}
#ticker { position: absolute; white-space: nowrap; font-size: 12px; color: var(--sub); line-height: 26px; will-change: transform; }
@keyframes marquee { from { transform: translateX(100vw); } to { transform: translateX(-100%); } }
body.event-active #ticker-bar { animation: alertPulse 1s infinite; }
@keyframes alertPulse { 0%, 100% { background-color: #0b1120; } 50% { background-color: #450a0a; } }

/* ---------- 演出 ---------- */
.float-num {
  position: fixed; color: var(--money); font-weight: bold; font-size: 18px;
  pointer-events: none; opacity: 0; z-index: 60;
}
.float-num.spend { color: var(--bad); }
.float-num.gold { color: var(--gold); font-size: 22px; }
.float-num.go { animation: floatUp .9s ease-out forwards; }
@keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-70px); } }
.toast {
  position: fixed; top: 54px; right: 14px; z-index: 80;
  background: linear-gradient(135deg, #3b2f1e, #1e293b); border: 1px solid var(--gold);
  color: var(--text); border-radius: 10px; padding: 10px 14px; font-size: 13px;
  animation: toastIn .3s ease-out;
  box-shadow: 0 6px 20px rgba(0, 0, 0, .5);
  max-width: 320px;
}
.toast .t-title { color: var(--gold); font-weight: bold; font-size: 12px; }
@keyframes toastIn { from { transform: translateX(40px); opacity: 0; } to { transform: none; opacity: 1; } }

/* ---------- モーダル ---------- */
#modal-root {
  position: fixed; inset: 0; background: rgba(2, 6, 23, .72); z-index: 90;
  display: none; align-items: center; justify-content: center; padding: 16px;
}
#modal-root.open { display: flex; }
.modal {
  background: var(--panel); border: 1px solid var(--line); border-radius: 16px;
  max-width: 540px; width: 100%; max-height: 86vh; overflow-y: auto; padding: 20px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, .6);
}
.modal h3 { margin: 0 0 8px; color: var(--accent); font-size: 17px; }
.modal p { font-size: 13px; line-height: 1.7; color: var(--text); }
.modal .choices button {
  display: block; width: 100%; text-align: left; margin: 8px 0; padding: 11px 13px;
  background: var(--panel2); border: 1px solid var(--line); color: var(--text);
  border-radius: 10px; font-size: 13px; cursor: pointer;
}
.modal .choices button:hover { border-color: var(--accent); }
.modal .result { color: var(--gold); font-style: italic; }
.modal .num { color: var(--money); font-weight: bold; }
.modal .skim { color: var(--bad); }
.modal-close {
  margin-top: 12px; width: 100%; padding: 10px; border-radius: 10px;
  background: var(--panel2); color: var(--sub); cursor: pointer; border: 1px solid var(--line);
}
.cta-buy {
  display: block; width: 100%; padding: 13px; margin-top: 10px; border: none; border-radius: 10px;
  background: linear-gradient(135deg, var(--gold), #d97706); color: #451a03;
  font-weight: bold; font-size: 14px; cursor: pointer; text-align: center; text-decoration: none;
}

/* 実績 */
.ach-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.ach { background: var(--panel2); border: 1px solid var(--line); border-radius: 10px; padding: 9px; }
.ach.no { opacity: .38; }
.ach .a-name { font-size: 12px; font-weight: bold; color: var(--gold); }
.ach.no .a-name { color: var(--sub); }
.ach .a-desc { font-size: 11px; color: var(--sub); margin-top: 2px; }
.share-btn {
  margin-top: 6px; font-size: 11px; padding: 3px 8px; border-radius: 6px;
  background: none; border: 1px solid var(--accent); color: var(--accent); cursor: pointer;
}

/* トーストのタップ表示 */
.toast { cursor: pointer; }
.toast .t-tap { font-size: 10px; color: var(--sub); margin-top: 4px; text-align: right; }

/* 島ステータス（出向・リストラ） */
.island-flavor { font-size: 12px; color: var(--sub); font-style: italic; margin: 4px 0 12px; }
.island-stat { display: flex; justify-content: space-between; align-items: center; gap: 8px; font-size: 13px; margin: 5px 0; }
.island-stat .label { color: var(--sub); }
.island-stat .money { color: var(--money); font-weight: bold; }
.island-stat .sub { color: var(--sub); font-size: 11px; }
.island-stat .yield { font-size: 12px; }
.island-stat .yield.up { color: var(--money); }
.island-stat .yield.down { color: var(--bad); }
.island-section { margin-top: 14px; padding-top: 10px; border-top: 1px solid var(--line); }
.island-h { font-size: 13px; font-weight: bold; color: var(--accent); margin-bottom: 6px; }
.tgt-row { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; margin: 8px 0; font-size: 12px; color: var(--sub); }
.tgt-btn {
  padding: 5px 10px; border: 1px solid var(--line); border-radius: 999px;
  background: var(--panel2); color: var(--sub); font-size: 12px; cursor: pointer;
}
.tgt-btn.sel { border-color: var(--accent); color: var(--accent); background: rgba(56,189,248,.12); font-weight: bold; }
.island-btns { display: flex; gap: 8px; margin-top: 8px; }
.isl-btn {
  flex: 1; padding: 9px; border: 1px solid var(--line); border-radius: 9px;
  background: var(--panel2); color: var(--text); font-size: 13px; font-weight: bold; cursor: pointer;
}
.isl-btn.go { background: linear-gradient(135deg, #38bdf8, #0ea5e9); color: #082f49; border: none; }
.isl-btn.danger { background: linear-gradient(135deg, #f87171, #dc2626); color: #450a0a; border: none; }
.isl-btn:disabled { background: #334155; color: #64748b; cursor: not-allowed; }

/* エンディング */
#ending-root {
  position: fixed; inset: 0; z-index: 100; overflow-y: auto; display: none;
  background: radial-gradient(900px 500px at 50% 0%, #1e1b4b 0%, #020617 70%);
  padding: 40px 18px;
}
#ending-root.open { display: block; }
.ending-inner { max-width: 640px; margin: 0 auto; text-align: center; }
.ending-inner h2 { color: var(--gold); font-size: 22px; letter-spacing: 2px; }
.ending-inner .e-body { text-align: left; line-height: 2; font-size: 14px; margin: 24px 0; color: var(--text); }
.ending-inner .e-rank { font-size: 16px; color: var(--accent); margin: 8px 0; }
.e-stats { text-align: left; background: rgba(30, 41, 59, .6); border: 1px solid var(--line); border-radius: 12px; padding: 14px 18px; font-size: 13px; }
.e-stats div { display: flex; justify-content: space-between; margin: 4px 0; }
.e-stats .label { color: var(--sub); }
.ending-inner .e-btns { margin-top: 24px; }
.prestige-btn {
  width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 15px; font-weight: bold;
  background: linear-gradient(135deg, #a855f7, #6d28d9); color: #f5f3ff; cursor: pointer;
}
.stay-btn { margin-top: 10px; width: 100%; padding: 11px; border-radius: 12px; background: none; border: 1px solid var(--line); color: var(--sub); cursor: pointer; }

/* ---------- タイトル画面 ---------- */
/* 帝国の構図: 下に夜の摩天楼、その足元をワーカーが延々と流れ、そこから💰が
   上の王冠へ吸い上がっていく。レバマスの「宇宙＋地球儀」とは別方向に振っている。 */
#title-screen {
  position: fixed; inset: 0; z-index: 200; overflow: hidden;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center; padding: 20px 16px;
  /* 下端は摩天楼が占めるので、その高さぶんの余白を空けて「街の上」に文字が載る形にする。
     こうすると画面の高さが変わってもロゴが空きスペースの中央に来る。 */
  padding-bottom: 214px;
  background: linear-gradient(180deg, #04060e 0%, #070c1c 38%, #14121f 62%, #2b1c0c 84%, #5c3608 100%);
  animation: ttl-fade .5s ease both;
}
#title-screen.leaving { animation: ttl-out .32s ease both; pointer-events: none; }
@keyframes ttl-fade { from { opacity: 0; } to { opacity: 1; } }
@keyframes ttl-out { to { opacity: 0; transform: scale(1.04); } }

/* 地平の光。搾り取った金が都市を照らしている、という画。 */
.ttl-glow { position: absolute; left: 50%; bottom: 0; width: 150%; height: 46%; transform: translateX(-50%);
  background: radial-gradient(ellipse at 50% 100%, rgba(245, 158, 11, .34) 0%, rgba(245, 158, 11, .10) 42%, transparent 72%); }

/* 摩天楼のシルエット。窓はドットグリッドで灯りを表現する。 */
/* 足元に「通り」のぶんの隙間を残し、そこをワーカーが流れる。 */
.ttl-city { position: absolute; left: 0; right: 0; bottom: 30px; height: 178px; display: flex; align-items: flex-end;
  justify-content: center; gap: 3px; pointer-events: none; }
.ttl-bldg {
  position: relative; flex: none; background-color: #05080f; border-radius: 2px 2px 0 0;
  border-top: 1px solid rgba(251, 191, 36, .16);
  background-image: radial-gradient(circle, rgba(251, 191, 36, .55) 0.9px, transparent 1.1px);
  background-size: 7px 9px; background-position: 3px 6px;
}
/* 中央の本社ビルだけ一段高く、屋上に赤灯を置いて「帝国の中心」を示す。 */
.ttl-bldg.hq { background-color: #070b16; border-top-color: rgba(251, 191, 36, .5); }
.ttl-hqlight { position: absolute; top: -5px; left: 50%; transform: translateX(-50%);
  width: 4px; height: 4px; border-radius: 50%; background: #f87171;
  box-shadow: 0 0 8px 2px rgba(248, 113, 113, .8); animation: ttl-blink 2.4s ease-in-out infinite; }
@keyframes ttl-blink { 0%, 100% { opacity: .25; } 50% { opacity: 1; } }

/* 働かされ続けるワーカーの列。途切れないよう同じ並びを2本つないで流す。 */
.ttl-crowd { position: absolute; left: 0; right: 0; bottom: 4px; height: 26px; overflow: hidden; }
.ttl-crowd-track { display: flex; width: max-content; animation: ttl-march 22s linear infinite; }
.ttl-crowd-half { display: flex; gap: 30px; padding-right: 30px; }
.ttl-worker { font-size: 15px; line-height: 1; animation: ttl-trudge 1.1s ease-in-out infinite; }
@keyframes ttl-march { to { transform: translateX(-50%); } }
@keyframes ttl-trudge { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-2.5px); } }

/* 足元から王冠へ吸い上がる💰。これがゲームの主題（ピンハネ）そのもの。 */
.ttl-coins { position: absolute; left: 0; right: 0; bottom: 34px; height: 340px; pointer-events: none; }
.ttl-coin { position: absolute; bottom: 0; font-size: 14px; opacity: 0; animation: ttl-rise 5.4s ease-in infinite; }
/* 街の足元からロゴの手前まで登り切らせる。途中で消えると「吸い上がっている」感じが出ない。 */
@keyframes ttl-rise {
  0%   { opacity: 0; transform: translateY(0) scale(.5); }
  12%  { opacity: .95; }
  62%  { opacity: .7; }
  100% { opacity: 0; transform: translateY(-330px) scale(1.1); }
}

.ttl-logo { position: relative; z-index: 2; animation: ttl-in .9s cubic-bezier(.2, 1.3, .4, 1) both; }
@keyframes ttl-in { 0% { transform: scale(.66); opacity: 0; } 62% { transform: scale(1.05); opacity: 1; } 100% { transform: scale(1); } }
.ttl-crown { font-size: 34px; line-height: 1; filter: drop-shadow(0 0 16px rgba(251, 191, 36, .6)); animation: ttl-hover 3.4s ease-in-out infinite; }
@keyframes ttl-hover { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
.ttl-name {
  margin-top: 10px; font-size: 42px; font-weight: 900; letter-spacing: 8px; line-height: 1.15;
  background: linear-gradient(180deg, #fffbeb 0%, #fcd34d 42%, #f59e0b 68%, #92400e 100%);
  -webkit-background-clip: text; background-clip: text; color: transparent;
  filter: drop-shadow(0 2px 12px rgba(251, 191, 36, .45));
}
.ttl-sub { margin-top: 10px; font-size: 11px; letter-spacing: 5px; color: #e2c98b; opacity: .9; }
.ttl-rule { width: 200px; height: 3px; margin: 16px auto 0; border-top: 1px solid rgba(251, 191, 36, .55);
  border-bottom: 1px solid rgba(251, 191, 36, .28); }
.ttl-tagline { margin-top: 14px; font-size: 11.5px; color: #b8a179; letter-spacing: 1px; line-height: 1.7; }

.ttl-btns { position: relative; z-index: 2; margin-top: 26px; display: flex; flex-direction: column; gap: 9px; width: 250px; max-width: 78vw; }
.ttl-btn {
  width: 100%; padding: 13px; border-radius: 12px; border: none; cursor: pointer;
  font-family: inherit; font-size: 15px; font-weight: bold; color: #241704;
  background: linear-gradient(135deg, #fcd34d, #f59e0b);
  box-shadow: 0 8px 22px rgba(245, 158, 11, .32);
  animation: ttl-pulse 1.9s ease-in-out infinite;
}
@keyframes ttl-pulse { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
.ttl-btn.sub {
  background: none; border: 1px solid rgba(251, 191, 36, .34); color: #e2c98b;
  font-size: 12px; font-weight: normal; padding: 10px; box-shadow: none; animation: none;
}
/* 版表記は街の上（右上）へ。下端に置くとワーカーの列と重なって読めない。 */
.ttl-foot { position: absolute; top: 12px; right: 14px; font-size: 10px; color: #6b5836; letter-spacing: 1px; }

@media (max-height: 560px) {
  #title-screen { padding-bottom: 132px; }
  .ttl-name { font-size: 30px; letter-spacing: 5px; }
  .ttl-crown { font-size: 24px; }
  .ttl-rule, .ttl-tagline { display: none; }
  .ttl-btns { margin-top: 15px; }
  .ttl-city { height: 104px; bottom: 26px; }
  .ttl-coins { height: 170px; bottom: 28px; animation: none; }
  .ttl-coin { animation-name: ttl-rise-s; }
  @keyframes ttl-rise-s {
    0% { opacity: 0; transform: translateY(0) scale(.5); }
    14% { opacity: .95; }
    100% { opacity: 0; transform: translateY(-165px) scale(1.08); }
  }
}

/* ---------- 初回チュートリアル ---------- */
/* 対象を指す吹き出し。位置と矢印の向きはJS側が「対象に重ならない空いている側」を選んで決める。 */
.tut-bubble { position: fixed; z-index: 65; visibility: hidden; }
.tut-box {
  position: relative; background: var(--panel); color: var(--text);
  border: 2px solid var(--gold); border-radius: 12px; padding: 11px 12px;
  box-shadow: 0 12px 34px rgba(0, 0, 0, .6); font-size: 12px;
}
.tut-head { font-weight: bold; color: var(--gold); font-size: 12px; margin-bottom: 6px; }
.tut-text { line-height: 1.65; color: var(--text); }
.tut-text b { color: var(--gold); }
.tut-btns { display: flex; gap: 8px; align-items: center; margin-top: 10px; }
.tut-next {
  flex: 1; background: linear-gradient(135deg, #f59e0b, #d97706); color: #1f1300;
  border: none; border-radius: 8px; padding: 8px; font-size: 12px; font-weight: bold; cursor: pointer;
}
.tut-skip { background: none; border: none; color: var(--sub); font-size: 11px; padding: 4px 6px; cursor: pointer; }
.tut-arrow { position: absolute; width: 0; height: 0; }
/* 案内中の対象を光らせる。位置に影響しないよう outline と box-shadow だけで表現する。 */
.tut-hl { outline: 3px solid var(--gold); outline-offset: 2px; box-shadow: 0 0 0 6px rgba(251, 191, 36, .22); border-radius: 10px; }

/* ---------- その他 ---------- */
#version { position: fixed; right: 8px; bottom: 30px; font-size: 10px; color: #475569; z-index: 21; }

/* ---------- モバイル ---------- */
@media (max-width: 700px) {
  header h1 .subtitle { display: none; }
  /* ヘッダーが横幅に収まらず右端が切れていた（375px幅で実測390px）。
     文字ラベルを畳み、余白・字間も詰めて1行に収める。 */
  .btn-label { display: none; }
  header { gap: 5px; padding: 0 8px; }
  header h1 { font-size: 14px; letter-spacing: 0; }
  .icon-btn { padding: 3px 6px; font-size: 11px; }
  .full-link { padding: 2px 7px; font-size: 10px; }
  #hud { width: 180px; padding: 9px 11px; top: 50px; left: 8px; }
  #cash { font-size: 20px; }
  .stat-row { font-size: 11px; }
  #hud .stat-row.optional { display: none; }
  #side-btns { right: 8px; bottom: 36px; gap: 6px; }
  #side-btns button { min-width: 74px; padding: 10px 10px; font-size: 12px; }
  #click-btn { left: 8px; bottom: 34px; padding: 11px 13px; font-size: 12px; }
  #drawer { width: 100vw; max-width: 100vw; }
  #version { bottom: 28px; }
}

    ]},
    { id: 'seikai',   minRank: 4, fullOnly: true, choices: [
      { cashPct: -0.1, noto: -20 },
      { noto: -5 },
      { cashPct: -0.3, noto: -30, pinhaneAll: 3 },
    ]},
  ],

  // 金庫（未回収キャッシュ）: 上限 = (基本90秒 + 増設×90秒) ぶんの収入
  vaultBaseSec: 90,
  vaultAddSec: 90,
  safeCostGrowth: 3,
  // 自動回収契約: 10分・手数料15%・契約金=収入300秒ぶん（最低はupgrades.autoCollect.cost）
  autoDurationSec: 600,
  autoFeePct: 0.15,
  autoCostIncomeSec: 300,
  // 出向・リストラ（島間の人員配置）
  guestProd: 0.85,          // 出向ワーカーの生産性（1つ上の島の高ピンハネ率で搾取される）
  dispatchStep: 10,         // UIの増減単位
  restructureRefund: 0.4,   // リストラ時の雇用費返金率
  restructureNoto: 8,       // リストラ1回あたりの悪評上昇
  // ゴールデン便
  goldenIntervalMin: 90,
  goldenIntervalMax: 240,
  goldenBuffChance: 0.25,
  goldenBuffMult: 2,
  goldenBuffSec: 60,
  goldenRewardSec: 300,

  eventIntervalMin: 180,
  eventIntervalMax: 480,
  notoTickThreshold: 0.6,
  attritionNoto: 80,
  attritionRate: 0.01,
  endingNoto: 50,
  whiteS: 10,
  whiteA: 5,
  prestigeDiv: 1e11,

  achievements: [
    { id: 'firstHire' },
    { id: 'ten' },
    { id: 'hundred' },
    { id: 'thousand' },
    { id: 'cap70' },
    { id: 'cap90', fullOnly: true },
    { id: 'saint' },
    { id: 'flame' },
    { id: 'clean' },
    { id: 'man' },
    { id: 'oku' },
    { id: 'chou' },
    { id: 'neet' },
    { id: 'finger' },
    { id: 'momikeshi' },
    { id: 'gyakubari' },
    { id: 'seii' },
    { id: 'endEmpire', fullOnly: true },
    { id: 'endWhiteS', fullOnly: true },
    { id: 'tensei', fullOnly: true },
  ],
};
if (typeof module !== 'undefined') module.exports = DATA;

// 純粋ロジック（DOM禁止。Math.randomはイベント抽選系のみ）
const Game = (() => {
  const D = (typeof DATA !== 'undefined') ? DATA : require('./data.js');
  const isFull = () => (typeof window !== 'undefined' && !!window.IS_FULL);

  function newState() {
    const counts = {}, prodMult = {}, guests = {}, guestTarget = {};
    for (const w of D.workers) { counts[w.id] = 0; prodMult[w.id] = 1; guests[w.id] = 0; guestTarget[w.id] = null; }
    return {
      cash: 0, lifetimeRevenue: 0, lifetimeIncome: 0,
      noto: 0, welfare: 0, renown: 0, rank: 1,
      counts, prodMult, guests, guestTarget,
      pinhaneBonus: 0, darkUnlocked: false,
      owned: {}, prCount: 0, welfareCount: 0,
      buffs: [],
      clicks: 0, lastClickAt: 0, notoWasHigh: false, pinhaneNeverRaised: true,
      choiceCounts: { pay: 0, honest: 0, evil: 0 },
      achieved: {}, ending: null, prestigeCount: 0,
      totalHired: 0, playSec: 0, seenCta: false,
      revealed: {}, bgmMood: 0,
      vault: 0, safeCount: 0, nextGoldenAt: 0,
      autoCollectSec: 0, autoFeePaid: 0,
      dex: { workers: {}, districts: { 0: true }, events: {} },
      nextEventAt: 0, savedAt: 0, muted: false,
      _minAcc: 0, _bootAt: 0,
    };
  }

  function fmt(n) {
    n = Math.floor(n);
    if (n < 0) return '-' + fmt(-n);
    if (n < 1e4) return '￥' + n.toLocaleString('ja-JP');
    const units = [[1e16, '京'], [1e12, '兆'], [1e8, '億'], [1e4, '万']];
    for (const [u, label] of units) {
      if (n >= u) {
        const v = n / u;
        let s;
        if (v >= 100) s = String(Math.floor(v));
        else if (v >= 10) s = v.toFixed(1);
        else s = v.toFixed(2);
        if (s.includes('.')) s = s.replace(/0+$/, '').replace(/\.$/, '');
        return '￥' + s + label;
      }
    }
  }

  const worker = id => D.workers.find(w => w.id === id);
  const upgradeDef = id => D.upgrades.find(u => u.id === id);
  const clampNoto = n => Math.max(0, Math.min(100, n));

  function totalWorkers(state) {
    let t = 0;
    for (const w of D.workers) t += state.counts[w.id];
    return t;
  }

  function workerCost(state, id) {
    let c = worker(id).cost * Math.pow(D.costGrowth, state.counts[id]);
    if (state.rank >= 2) c *= 0.9;
    return Math.ceil(c);
  }

  function pinhaneRate(state, id) {
    const cap = state.darkUnlocked ? D.pinhaneCapDark : D.pinhaneCap;
    return Math.min(cap, Math.max(1, worker(id).pinhane + state.pinhaneBonus));
  }

  const guestsOf = (state, id) => (state.guests && state.guests[id]) || 0;

  function revenuePerSec(state) {
    let r = 0;
    for (let i = 0; i < D.workers.length; i++) {
      const w = D.workers[i];
      const g = guestsOf(state, w.id);
      const home = state.counts[w.id] - g;
      const unit = w.base * state.prodMult[w.id];
      r += home * unit + g * unit * D.guestProd;
    }
    return r;
  }

  // バフ・ランク・人脈補正抜きの素の実収入（実効ピンハネ率の分子）
  const guestTargetOf = (state, id) => (state.guestTarget && state.guestTarget[id] != null) ? state.guestTarget[id] : null;

  // 出向したワーカーは生産性guestProd倍だが「指定した島」の高いピンハネ率で搾取される
  function baseIncomePerSec(state) {
    let r = 0;
    for (let i = 0; i < D.workers.length; i++) {
      const w = D.workers[i];
      const g = guestsOf(state, w.id);
      const home = state.counts[w.id] - g;
      const unit = w.base * state.prodMult[w.id];
      r += home * unit * pinhaneRate(state, w.id) / 100;
      if (g > 0) {
        const t = guestTargetOf(state, w.id);
        const rate = (t != null && D.workers[t]) ? pinhaneRate(state, D.workers[t].id) : pinhaneRate(state, w.id);
        r += g * unit * D.guestProd * rate / 100;
      }
    }
    return r;
  }

  // ---------- 出向（島間の人員配置。宛先を指定して派遣） ----------
  // 派遣先の候補 = 自分より上（index大）で開放済みの島。上限 = min(自分の人数, 派遣先の人数)。
  function dispatchTargets(state, id) {
    const i = D.workers.findIndex(w => w.id === id);
    const out = [];
    for (let d = i + 1; d < D.workers.length; d++) {
      if (state.rank < d + 1) continue;            // 未開放
      if (D.workers[d].fullOnly && !isFull()) continue;
      out.push(d);
    }
    return out;
  }
  function setGuestTarget(state, id, t) {
    const ok = dispatchTargets(state, id).includes(t);
    state.guestTarget[id] = ok ? t : null;
    // 宛先が変わったら人数を新しい上限に合わせる
    state.guests[id] = Math.min(guestsOf(state, id), guestCap(state, id));
    return state.guestTarget[id];
  }
  function guestCap(state, id) {
    const t = guestTargetOf(state, id);
    if (t == null || !dispatchTargets(state, id).includes(t)) return 0;
    return Math.min(state.counts[id], state.counts[D.workers[t].id]);
  }
  function setGuests(state, id, n) {
    const v = Math.max(0, Math.min(Math.floor(n), guestCap(state, id)));
    state.guests[id] = v;
    return v;
  }
  function clampGuests(state) {
    for (const w of D.workers) {
      // 宛先が未開放/消滅していたら解除
      if (guestTargetOf(state, w.id) != null && !dispatchTargets(state, w.id).includes(state.guestTarget[w.id])) {
        state.guestTarget[w.id] = null;
      }
      const cap = guestCap(state, w.id);
      if (guestsOf(state, w.id) > cap) state.guests[w.id] = cap;
    }
  }

  // ---------- リストラ（人員削減） ----------
  function restructure(state, id, n) {
    const fired = Math.max(0, Math.min(Math.floor(n), state.counts[id]));
    if (fired <= 0) return { fired: 0, refund: 0 };
    const refund = workerCost(state, id) * D.restructureRefund * fired;
    state.counts[id] -= fired;
    state.cash += refund;
    state.noto = clampNoto(state.noto + D.restructureNoto);
    clampGuests(state);
    return { fired, refund };
  }

  function buffMult(state, nowMs) {
    let m = 1;
    for (const b of state.buffs) if (b.until > nowMs) m *= b.mult;
    return m;
  }

  function incomePerSec(state, nowMs) {
    let r = baseIncomePerSec(state);
    if (state.rank >= 3) r *= 1.05;
    r *= 1 + 0.1 * state.renown;
    r *= buffMult(state, nowMs === undefined ? Date.now() : nowMs);
    return r;
  }

  function effectiveRate(state) {
    const rev = revenuePerSec(state);
    return rev > 0 ? baseIncomePerSec(state) / rev : 0;
  }

  function clickGain(state) {
    return D.clickBase * (1 + 0.1 * state.renown);
  }

  function doClick(state, nowMs) {
    const g = clickGain(state);
    state.cash += g;
    state.lifetimeIncome += g;
    state.clicks++;
    state.lastClickAt = nowMs;
    return g;
  }

  function buyWorker(state, id) {
    const w = worker(id);
    if (w.unlockRank > state.rank) return false;
    if (w.fullOnly && !isFull()) return false;
    const c = workerCost(state, id);
    if (state.cash < c) return false;
    state.cash -= c;
    state.counts[id]++;
    state.totalHired++;
    state.dex.workers[id] = true;
    return true;
  }

  function upgradeCost(state, id) {
    const u = upgradeDef(id);
    if (u.kind === 'pr') return u.cost * (state.prCount + 1);
    if (u.kind === 'welfare') return u.cost * (state.welfareCount + 1);
    if (u.kind === 'safe') return u.cost * Math.pow(D.safeCostGrowth, state.safeCount);
    if (u.kind === 'auto') return Math.max(u.cost, Math.ceil(incomePerSec(state) * D.autoCostIncomeSec));
    return u.cost;
  }

  // 金額以外の購入条件（表示にも使う）
  function canBuyUpgrade(state, id) {
    const u = upgradeDef(id);
    if (u.fullOnly && !isFull()) return false;
    if (u.kind !== 'pr' && u.kind !== 'welfare' && state.owned[id]) return false;
    if (u.needNoto && state.noto < u.needNoto) return false;
    return true;
  }

  function buyUpgrade(state, id) {
    const u = upgradeDef(id);
    if (!canBuyUpgrade(state, id)) return false;
    const c = upgradeCost(state, id);
    if (state.cash < c) return false;
    state.cash -= c;
    if (u.kind === 'prod') {
      if (u.target === 'all') for (const w of D.workers) state.prodMult[w.id] *= u.mult;
      else state.prodMult[u.target] *= u.mult;
      state.owned[id] = true;
    } else if (u.kind === 'pinhane') {
      state.pinhaneBonus += u.pt;
      state.pinhaneNeverRaised = false;
      state.owned[id] = true;
    } else if (u.kind === 'dark') {
      state.darkUnlocked = true;
      state.owned[id] = true;
    } else if (u.kind === 'safe') {
      state.safeCount++;
    } else if (u.kind === 'auto') {
      state.autoCollectSec += D.autoDurationSec; // 契約制（積める）
    } else if (u.kind === 'pr') {
      state.prCount++;
    } else if (u.kind === 'welfare') {
      state.welfareCount++;
      state.welfare++;
      for (const w of D.workers) state.prodMult[w.id] *= u.prodMult;
    }
    if (u.noto) state.noto = clampNoto(state.noto + u.noto);
    return true;
  }

  function rankCost(state) {
    const next = D.ranks[state.rank]; // ranks[0]=レベル1 なので添字=現ランクが次
    return next ? next.cost : null;
  }

  function nextRankLocked(state) {
    const next = D.ranks[state.rank];
    return !!(next && next.fullOnly && !isFull());
  }

  function rankUp(state) {
    const next = D.ranks[state.rank];
    if (!next) return false;
    if (next.fullOnly && !isFull()) return false;
    if (state.cash < next.cost) return false;
    state.cash -= next.cost;
    state.rank = next.level;
    state.dex.districts[state.rank - 1] = true;
    if (state.rank === 5) {
      state.ending = state.noto >= D.endingNoto ? 'empire' : 'white';
      return 'ending';
    }
    return true;
  }

  // ---------- 金庫（未回収キャッシュ） ----------
  function vaultCapSec(state) {
    return D.vaultBaseSec + state.safeCount * D.vaultAddSec;
  }
  function vaultCap(state, nowMs) {
    return vaultCapSec(state) * incomePerSec(state, nowMs);
  }
  function collect(state, fraction) {
    const f = fraction === undefined ? 1 : Math.max(0, Math.min(1, fraction));
    const moved = state.vault * f;
    if (moved <= 0) return 0;
    state.cash += moved;
    state.lifetimeIncome += moved;
    state.vault -= moved;
    return moved;
  }

  function tick(state, dtSec, nowMs) {
    state.buffs = state.buffs.filter(b => b.until > nowMs);
    const inc = incomePerSec(state, nowMs) * dtSec;
    if (state.autoCollectSec > 0) {
      // 契約中: 自動入金だが運営費を中抜きされる
      state.autoCollectSec = Math.max(0, state.autoCollectSec - dtSec);
      const fee = inc * D.autoFeePct;
      state.cash += inc - fee;
      state.lifetimeIncome += inc - fee;
      state.autoFeePaid += fee;
    } else {
      state.vault = Math.min(state.vault + inc, vaultCap(state, nowMs));
    }
    state.lifetimeRevenue += revenuePerSec(state) * dtSec;
    state.playSec += dtSec;
    state._minAcc += dtSec;
    while (state._minAcc >= 60) {
      state._minAcc -= 60;
      if (effectiveRate(state) > D.notoTickThreshold) state.noto = clampNoto(state.noto + 1);
      if (state.noto >= D.attritionNoto) {
        for (const w of D.workers) {
          state.counts[w.id] -= Math.floor(state.counts[w.id] * D.attritionRate);
        }
      }
    }
    if (state.noto >= 50) state.notoWasHigh = true;
    clampGuests(state); // 人数変動・昇格に追従
  }

  // ---------- 図鑑 ----------
  function discoverEvent(state, id) {
    if (state.dex.events[id]) return false;
    state.dex.events[id] = true;
    return true;
  }

  // ---------- ゴールデン便 ----------
  function scheduleGolden(state, nowMs) {
    const base = D.goldenIntervalMin + Math.random() * (D.goldenIntervalMax - D.goldenIntervalMin);
    state.nextGoldenAt = nowMs + base * 1000;
  }
  function goldenHit(state, nowMs) {
    scheduleGolden(state, nowMs);
    if (Math.random() < D.goldenBuffChance) {
      state.buffs.push({ mult: D.goldenBuffMult, until: nowMs + D.goldenBuffSec * 1000 });
      return { type: 'buff', mult: D.goldenBuffMult, sec: D.goldenBuffSec };
    }
    const amount = Math.max(incomePerSec(state, nowMs) * D.goldenRewardSec, clickGain(state) * 30);
    state.cash += amount;
    state.lifetimeIncome += amount;
    return { type: 'cash', amount };
  }

  function scheduleNextEvent(state, nowMs) {
    const base = D.eventIntervalMin + Math.random() * (D.eventIntervalMax - D.eventIntervalMin);
    state.nextEventAt = nowMs + base * 1000 * (1 - state.noto / 200);
  }

  function eligibleEvents(state) {
    return D.events.filter(e =>
      (!e.fullOnly || isFull()) &&
      (!e.minRank || state.rank >= e.minRank) &&
      (!e.minNoto || state.noto >= e.minNoto) &&
      (e.maxNoto === undefined || state.noto < e.maxNoto) &&
      (!e.minWorkers || totalWorkers(state) >= e.minWorkers)
    );
  }

  function pickEvent(state) {
    const list = eligibleEvents(state);
    if (!list.length) return null;
    return list[Math.floor(Math.random() * list.length)];
  }

  function applyChoice(state, event, idx, nowMs) {
    const eff = event.choices[idx];
    if (eff.cashPct) state.cash = Math.max(0, state.cash + state.cash * eff.cashPct);
    if (eff.noto) state.noto = clampNoto(state.noto + eff.noto);
    if (eff.pinhaneAll) {
      state.pinhaneBonus += eff.pinhaneAll;
      if (eff.pinhaneAll > 0) state.pinhaneNeverRaised = false;
    }
    if (eff.workersPct) {
      for (const w of D.workers) {
        const n = state.counts[w.id];
        if (eff.workersPct < 0) state.counts[w.id] = n - Math.floor(n * -eff.workersPct);
        else state.counts[w.id] = n + Math.ceil(n * eff.workersPct);
      }
    }
    if (eff.buff) state.buffs.push({ mult: eff.buff.mult, until: nowMs + eff.buff.sec * 1000 });
    state.choiceCounts[['pay', 'honest', 'evil'][idx]]++;
    scheduleNextEvent(state, nowMs);
  }

  function offlineGain(state, nowMs) {
    if (!state.savedAt) return null;
    const sec = Math.min((nowMs - state.savedAt) / 1000, D.offlineMaxSec);
    if (sec < 60) return null;
    const gross = incomePerSec(state, nowMs) * sec;
    if (gross <= 0) return null;
    const net = gross * D.offlineRate;
    state.cash += net;
    state.lifetimeIncome += net;
    return { sec, gross, skim: gross - net, net };
  }

  function save(state) {
    return JSON.stringify({ v: 1, state, savedAt: Date.now() });
  }

  function load(json) {
    try {
      const d = JSON.parse(json);
      if (!d || d.v !== 1 || !d.state) return null;
      const base = newState();
      const s = Object.assign(base, d.state);
      s.counts = Object.assign({}, newState().counts, d.state.counts);
      s.prodMult = Object.assign({}, newState().prodMult, d.state.prodMult);
      s.guests = Object.assign({}, newState().guests, d.state.guests);
      s.guestTarget = Object.assign({}, newState().guestTarget, d.state.guestTarget);
      s.choiceCounts = Object.assign({ pay: 0, honest: 0, evil: 0 }, d.state.choiceCounts);
      s.revealed = Object.assign({}, d.state.revealed || {});
      const dx = d.state.dex || {};
      s.dex = {
        workers: Object.assign({}, dx.workers || {}),
        districts: Object.assign({ 0: true }, dx.districts || {}),
        events: Object.assign({}, dx.events || {}),
      };
      s.buffs = Array.isArray(d.state.buffs) ? d.state.buffs : [];
      s.savedAt = d.savedAt || 0;
      // 旧セーブ互換
      if (d.state.bgmMood === undefined) s.bgmMood = d.state.bgm === false ? -1 : 0;
      if (s.owned.autoCollect) {
        s.autoCollectSec = Math.max(s.autoCollectSec || 0, D.autoDurationSec);
        delete s.owned.autoCollect;
      }
      return s;
    } catch (e) {
      return null;
    }
  }

  // ---------- 段階的アンロック（発見の演出） ----------
  // 労働者: 1つ前のタイプを雇用済み＆資金がコストの35%に達すると公開
  // アップグレード: 資金がコストの30%に達すると公開。未公開のうち最安2件だけ「？？？」表示
  function updateReveals(state) {
    const newly = [];
    D.workers.forEach((w, i) => {
      const key = 'w_' + w.id;
      if (i === 0 || state.revealed[key]) return;
      const prevHired = state.counts[D.workers[i - 1].id] > 0;
      if ((prevHired && state.cash >= w.cost * 0.35) || state.counts[w.id] > 0) {
        state.revealed[key] = true;
        newly.push(key);
      }
    });
    for (const u of D.upgrades) {
      const key = 'u_' + u.id;
      if (state.revealed[key]) continue;
      const bought = state.owned[u.id] || (u.kind === 'pr' && state.prCount > 0) ||
        (u.kind === 'welfare' && state.welfareCount > 0);
      if (bought || state.cash >= upgradeCost(state, u.id) * 0.3) {
        state.revealed[key] = true;
        newly.push(key);
      }
    }
    return newly;
  }

  function workerVisibility(state, id) {
    const i = D.workers.findIndex(w => w.id === id);
    if (i === 0 || state.revealed['w_' + id]) return 'open';
    const prevOpen = i - 1 === 0 || state.revealed['w_' + D.workers[i - 1].id];
    return prevOpen ? 'teaser' : 'hidden';
  }

  function upgradeVisibility(state, id) {
    if (state.revealed['u_' + id]) return 'open';
    const teasers = D.upgrades
      .filter(x => !state.revealed['u_' + x.id])
      .sort((a, b) => upgradeCost(state, a.id) - upgradeCost(state, b.id))
      .slice(0, 2);
    return teasers.some(x => x.id === id) ? 'teaser' : 'hidden';
  }

  const ACH_CHECKS = {
    firstHire: s => s.totalHired >= 1,
    ten: s => totalWorkers(s) >= 10,
    hundred: s => totalWorkers(s) >= 100,
    thousand: s => totalWorkers(s) >= 1000,
    cap70: s => D.workers.some(w => pinhaneRate(s, w.id) >= 70),
    cap90: s => D.workers.some(w => pinhaneRate(s, w.id) >= 90),
    saint: s => s.rank >= 3 && s.pinhaneNeverRaised,
    flame: s => s.noto >= 100,
    clean: s => s.notoWasHigh && s.noto <= 0,
    man: s => s.cash >= 1e4,
    oku: s => s.cash >= 1e8,
    chou: s => s.cash >= 1e12,
    neet: (s, now) => totalWorkers(s) > 0 && now - Math.max(s.lastClickAt, s._bootAt) >= 30 * 60 * 1000,
    finger: s => s.clicks >= 1000,
    momikeshi: s => s.choiceCounts.pay >= 10,
    gyakubari: s => s.choiceCounts.evil >= 10,
    seii: s => s.choiceCounts.honest >= 10,
    endEmpire: s => s.ending === 'empire',
    endWhiteS: s => s.ending === 'white' && s.welfare >= D.whiteS,
    tensei: s => s.prestigeCount >= 1,
  };

  function checkAchievements(state, nowMs) {
    const out = [];
    for (const a of D.achievements) {
      if (state.achieved[a.id]) continue;
      if (a.fullOnly && !isFull()) continue;
      if (ACH_CHECKS[a.id](state, nowMs)) {
        state.achieved[a.id] = true;

  // ---------- 島ステータス（出向・リストラ） ----------
  function islandBaseIncome(d) {
    const w = D.workers[d];
    const home = state.counts[w.id] - Game.guestsOf(state, w.id);
    let inc = home * w.base * state.prodMult[w.id] * Game.pinhaneRate(state, w.id) / 100;
    if (d >= 1) {
      const prev = D.workers[d - 1];
      const g = Game.guestsOf(state, prev.id);
      inc += g * prev.base * state.prodMult[prev.id] * D.guestProd * Game.pinhaneRate(state, w.id) / 100;
    }
    return inc;
  }
  function showIsland(d) {
    const step = D.dispatchStep;
    function render() {
      const w = D.workers[d];
      const sw = S.workers[w.id];
      const rate = Game.pinhaneRate(state, w.id);
      const dispatched = Game.guestsOf(state, w.id);
      const home = state.counts[w.id] - dispatched;
      const yieldHome = w.base * state.prodMult[w.id] * rate / 100;

      // 出向受け入れ（下の島から来ている人）
      let guestsInHtml = '';
      if (d >= 1) {
        const prev = D.workers[d - 1];
        const gin = Game.guestsOf(state, prev.id);
        if (gin > 0) guestsInHtml = `<div class="card-sub">${S.ui.islandGuestsIn
          .replace('{n}', gin).replace('{from}', S.workers[prev.id].name)}</div>`;
      }

      // 出向セクション（宛先を指定して派遣）
      const targets = Game.dispatchTargets(state, w.id);
      let dispatchHtml;
      if (!targets.length) {
        dispatchHtml = `<div class="card-sub">${S.ui.dispatchNoUp}</div>`;
      } else {
        // 宛先未指定なら候補の先頭（最安の上位島）を既定に
        let tgt = Game.guestTargetOf(state, w.id);
        if (tgt == null || !targets.includes(tgt)) { tgt = targets[0]; Game.setGuestTarget(state, w.id, tgt); }
        const cap = Game.guestCap(state, w.id);
        const tw = D.workers[tgt];
        const yieldGuest = w.base * state.prodMult[w.id] * D.guestProd * Game.pinhaneRate(state, tw.id) / 100;
        const arrow = yieldGuest > yieldHome ? '▲' : (yieldGuest < yieldHome ? '▼' : '＝');
        const cls = yieldGuest > yieldHome ? 'up' : (yieldGuest < yieldHome ? 'down' : '');
        const targetBtns = targets.map(ti =>
          `<button class="tgt-btn ${ti === tgt ? 'sel' : ''}" data-t="${ti}">${S.districts[ti]}（${Game.pinhaneRate(state, D.workers[ti].id)}%）</button>`).join('');
        dispatchHtml = `
          <div class="card-sub">${S.ui.dispatchDesc
            .replace('{name}', sw.name).replace('{up}', S.districts[tgt])
            .replace('{prod}', Math.round(D.guestProd * 100))}</div>
          <div class="tgt-row">${S.ui.dispatchPick}${targetBtns}</div>
          <div class="island-stat"><span>${S.ui.dispatchState.replace('{cur}', dispatched).replace('{cap}', cap)}</span>
            <span class="yield ${cls}">${arrow} ${S.ui.dispatchYield
              .replace('{home}', F(yieldHome)).replace('{guest}', F(yieldGuest))}</span></div>
          <div class="island-btns">
            <button class="isl-btn" id="isl-recall" ${dispatched <= 0 ? 'disabled' : ''}>${S.ui.recallBtn.replace('{n}', step)}</button>
            <button class="isl-btn go" id="isl-send" ${dispatched >= cap ? 'disabled' : ''}>${S.ui.sendBtn.replace('{n}', step)}</button>
          </div>`;
      }

      // リストラセクション
      const fireN = Math.min(step, state.counts[w.id]);
      const refund = Game.workerCost(state, w.id) * D.restructureRefund * fireN;
      let restructHtml;
      if (state.counts[w.id] <= 0) {
        restructHtml = `<div class="card-sub">${S.ui.restructureNone}</div>`;
      } else {
        restructHtml = `
          <div class="card-sub">${S.ui.restructureDesc
            .replace('{name}', sw.name).replace('{refund}', Math.round(D.restructureRefund * 100))
            .replace('{noto}', D.restructureNoto)}</div>
          <div class="island-btns">
            <button class="isl-btn danger" id="isl-fire">${S.ui.restructureBtn
              .replace('{n}', fireN).replace('{refund}', F(refund))}</button>
          </div>`;
      }

      const m = openModal(`
        <h3>${w.emoji} ${S.districts[d]}</h3>
        <p class="island-flavor">${S.districtFlavor[d]}</p>
        <div class="island-stat"><span class="label">${S.ui.islandPop}</span>
          <span>${state.counts[w.id]}${S.ui.count}${dispatched > 0 ? ' <span class="sub">' + S.ui.guestBadge.replace('{n}', dispatched) + '</span>' : ''}</span></div>
        <div class="island-stat"><span class="label">${S.ui.islandRate}（${sw.name}）</span><span>${rate}%</span></div>
        <div class="island-stat"><span class="label">${S.ui.islandIncome}</span><span class="money">${F(islandBaseIncome(d))}${S.ui.perSec}</span></div>
        ${guestsInHtml}
        <div class="island-section"><div class="island-h">${S.ui.dispatchTitle}</div>${dispatchHtml}</div>
        <div class="island-section"><div class="island-h">${S.ui.restructureTitle}</div>${restructHtml}</div>
        <button class="modal-close">${S.ui.close}</button>`);
      m.querySelector('.modal-close').onclick = closeModal;
      const bind = (id, fn) => { const b = m.querySelector(id); if (b) b.onclick = () => { fn(); Sound.sfx('press'); saveNow(); render(); }; };
      bind('#isl-send', () => Game.setGuests(state, w.id, dispatched + step));
      bind('#isl-recall', () => Game.setGuests(state, w.id, dispatched - step));
      m.querySelectorAll('.tgt-btn').forEach(b => b.onclick = () => {
        Game.setGuestTarget(state, w.id, +b.dataset.t); Sound.sfx('press'); saveNow(); render();
      });
      const fireBtn = m.querySelector('#isl-fire');
      if (fireBtn) fireBtn.onclick = () => {
        const r = Game.restructure(state, w.id, step);
        if (r.fired > 0) { Sound.sfx('coin'); toast('✂️ リストラ実行', `${sw.name}を${r.fired}人解雇。${F(r.refund)}回収／悪評度+${D.restructureNoto}`); }
        saveNow(); render();
      };
    }
    render();
  }

  // ---------- エンディング＆転生（完全版） ----------
